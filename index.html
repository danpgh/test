  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 14px;
      padding-right: 14px;
      padding-bottom: 28px;
    }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    h1 { margin:0 0 6px; font-size:1.15rem; }
    .hint { margin:0; color:var(--muted); font-size:.9rem; }
    .top { display:grid; gap:10px; margin-bottom:12px; }
    .controls { display:grid; grid-template-columns:auto 1fr 220px auto; gap:8px; }
    input,select { width:100%; border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px 12px; outline:none; }
    button { border:1px solid var(--border); border-radius:0 !important; background:#131a2d; color:var(--text); padding:7px 9px; font-size:.82rem; cursor:pointer; min-height:38px; }
    button.active { border-color:var(--accent); color:#dce4ff; }
    .notice { color:#bfcef8; font-size:.84rem; line-height:1.35; }
    .quick-nav { display:flex; gap:8px; flex-wrap:wrap; }
    .quick-nav button { padding:5px 10px; font-weight:600; min-width:112px; }
    .quick-nav button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

    .panel-focus {
      box-shadow: 0 0 0 2px rgba(111,140,255,.75), 0 14px 30px rgba(0,0,0,.45);
      transition: box-shadow .25s ease;
    }
    .media-row {
      display:grid;
      grid-template-columns:minmax(520px, 1.55fr) minmax(320px, 0.95fr);
      gap:10px;
      align-items:start;
      margin-bottom:12px;
    }
    .player {
      width: 100%;
      margin: 0;
      background:rgba(10,14,24,.95);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:visible;
      box-shadow:0 14px 30px rgba(0,0,0,.45);
      position: relative;
      z-index: 2;
    }
    .tv-guide {
      width: 100%;
      position: relative;
      margin: 0;
      z-index: 1;
      background: rgba(10,14,24,.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 12px 22px rgba(0,0,0,.35);
    }
    .guide-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
    .guide-title { margin: 0; font-size: 1.28rem; color: #c9d3f7; font-weight:700; }
    .guide-badge { font-size:1.05rem; border:1px solid #3a4a7b; background:#1a2444; color:#ccdaff; border-radius:999px; padding:4px 10px; }
    .guide-badge.live { border-color:#2f8762; background:#123527; color:#8df0be; }
    .guide-list { max-height: 360px; overflow-y: auto; padding-right: 4px; }
    .guide-row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; font-size: 1.16rem; margin-bottom: 10px; }
    .guide-row.now .guide-time { color: #8df0be; font-weight: 700; }
    .guide-row.now .guide-show { color: #f2fff8; }
    .guide-time { color: #9db0eb; }
    .guide-show { color: #e1e8ff; line-height:1.35; }
    .player-head { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:8px 10px; }
    .player-title { margin:0; font-size:.95rem; }
    .player-tools { display:flex; align-items:center; gap:8px; }
    .player-meta { color:var(--muted); font-size:.82rem; }
    .player-ch { min-height:30px; padding:5px 10px; font-size:.72rem; font-weight:700; }
    .player-wrap {
      position:relative;
      border-top:1px solid var(--border);
      overflow:visible;
      background:#000;
      aspect-ratio:16/9;
      min-height: 360px;
      max-height: 520px;
      padding-right: 0;
    }
    .player-frame {
      width: calc(100% + 28px);
      margin-left: -14px;
      height:100%;
      border:0;
      background:#000;
    }
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px; display:grid; gap:6px; min-height:96px; cursor:pointer; }
    .card.dragging { opacity:.5; border-style:dashed; }
    .title-row { display:flex; align-items:center; gap:8px; }
    .tv-logo { width:22px; height:22px; object-fit:contain; border-radius:3px; background:#0d1323; border:1px solid #2a365a; padding:2px; }
    .tv-logo-fallback {
      width:22px;
      height:22px;
      border-radius:3px;
      border:1px solid #2a365a;
      display:grid;
      place-items:center;
      font-size:.55rem;
      color:#dce6ff;
      background:linear-gradient(180deg,#253667,#1a2444);
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .card.active { border-color:var(--accent); }
    .card-header { display:flex; align-items:start; justify-content:space-between; gap:8px; }
    .title { margin:0; font-size:.82rem; line-height:1.2; }
    .badge { font-size:.62rem; color:#c7d3ff; background:#222c49; border:1px solid #3a4a7b; border-radius:999px; padding:1px 6px; white-space:nowrap; }
    .desc { margin:0; font-size:.68rem; color:var(--muted); line-height:1.2; }
    .actions { display:flex; gap:5px; margin-top:auto; }
    .open { flex:1; background:linear-gradient(180deg,#5e79f5,#4a63cf); border-color:#4861ca; color:#f1f4ff; font-weight:600; font-size:.72rem; }
    .fav { width:32px; height:32px; padding:0; }
    .fav.active { color:var(--fav); border-color:var(--fav); }
    .empty { color:var(--muted); text-align:center; padding:20px 0; }

    @media (max-width:1400px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } }
    @media (max-width:1160px) {
      .grid { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .guide-list { max-height: 280px; }
      .player-wrap { min-height: 300px; max-height: 400px; }
    }
    @media (max-width:900px) {
      .controls { grid-template-columns:1fr; }
      .media-row { grid-template-columns:1fr; }
      .grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
      .wrap { padding-bottom: 230px; }
    }
    @media (max-width:680px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:430px) {
      .grid { grid-template-columns:1fr; }
      .guide-list { max-height: 180px; }
      .player-wrap { min-height: 220px; max-height: 280px; }
      .wrap { padding-bottom: 20px; }
    }
  </style>

    function normalizeEntriesToToday(entries) {
      const today = todayKey();
      return (Array.isArray(entries) ? entries : []).map((entry) => {
        const startText = String(entry?.start || '');
        const hhmmssMatch = startText.match(/T(\d{2}:\d{2}(?::\d{2})?)/);
        const timePart = hhmmssMatch ? hhmmssMatch[1] : '00:00:00';
        const normalizedTime = timePart.length === 5 ? `${timePart}:00` : timePart;
        return { ...entry, start: `${today}T${normalizedTime}` };
      });
    }
    function loadEpgSeedData() {

        const raw = document.getElementById('epgData')?.textContent || '{}';

        const channelsData = parsed.channels || {};
        const byKey = {};
        for (const [name, entries] of Object.entries(channelsData)) {
          const normalized = normalizeChannelName(name);
          const normalizedNoSpaces = normalized.replace(/\s+/g, '');
          const normalizedEntries = normalizeEntriesToToday(entries);
          byKey[normalized] = normalizedEntries;
          byKey[normalizedNoSpaces] = normalizedEntries;
        }
        epgSeedPrograms = byKey;
      } catch {
        epgSeedPrograms = {};
      }
    }

      if (!channel?.name) return [];
      const normalized = normalizeChannelName(channel.name);
      const alias = channelAliasToProgramTv[normalized] ? normalizeChannelName(channelAliasToProgramTv[normalized]) : '';
      return epgSeedPrograms[normalized]
        || epgSeedPrograms[normalized.replace(/\s+/g, '')]
        || (alias ? (epgSeedPrograms[alias] || epgSeedPrograms[alias.replace(/\s+/g, '')]) : null)

    function buildSyntheticProgram(channel) {
      const now = new Date();
      const day = todayKey();
      const startHours = [6, 8, 10, 12, 14, 16, 18, 20, 22];
      const labelByCategory = {
        General: ['Stiri', 'Magazin', 'Serial', 'Show live', 'Film de seara'],
        News: ['Jurnal', 'Breaking News', 'Analiza', 'Interviu', 'Sinteza Zilei'],
        Sports: ['Studio Sport', 'Live', 'Rezumat', 'Analiza'],

        Music: ['Top Hits', 'Concert', 'Playlist'],
        Entertainment: ['Show', 'Reality', 'Comedy'],
        Lifestyle: ['Lifestyle', 'Calatorii', 'Retete']
      };
      const pool = labelByCategory[channel.category] || ['Program'];
      return startHours.map((hour, idx) => {
        const h = String(hour).padStart(2, '0');
        const title = `${pool[idx % pool.length]} ${channel.name}`;
        return { start: `${day}T${h}:00:00`, title, synthetic: true };

    function buildCinemagiaGuideMap(payload) {
      const out = {};
      for (const [channelName, entries] of Object.entries(payload || {})) {
        const normalized = normalizeChannelName(channelName || '');
        if (!normalized) continue;
        out[normalized] = entries;

    function getCinemagiaEntriesForChannel(channel) {
      if (!channel?.name) return [];
      const normalized = normalizeChannelName(channel.name);
      const alias = channelAliasToProgramTv[normalized] ? normalizeChannelName(channelAliasToProgramTv[normalized]) : '';
      const direct = cinemagiaGuideMap[normalized]
        || cinemagiaGuideMap[normalized.replace(/\s+/g, '')]
        || (alias ? (cinemagiaGuideMap[alias] || cinemagiaGuideMap[alias.replace(/\s+/g, '')]) : null)
        || null;
      if (direct) return direct;

      const targetTokens = normalized.split(' ').filter(Boolean);
      let bestScore = 0;
      let best = null;
      for (const [key, entries] of Object.entries(cinemagiaGuideMap)) {
        if (!key.includes(' ')) continue;
        const keyTokens = key.split(' ').filter(Boolean);
        if (!keyTokens.length || !targetTokens.length) continue;
        const overlap = targetTokens.filter((t) => keyTokens.includes(t)).length;
        const score = overlap / Math.max(targetTokens.length, keyTokens.length);
        if (score > bestScore) {
          bestScore = score;
          best = entries;
        }
      }
      return bestScore >= 0.5 ? (best || []) : [];
    }

    function isNoiseProgramLine(line) {
      const value = String(line || '').trim();
      if (!value) return true;
      if (/^image$/i.test(value)) return true;
      if (/^follow us$/i.test(value)) return true;
      if (/^close ad$/i.test(value)) return true;
      if (/^ap$/i.test(value)) return true;
      if (/^copyright/i.test(value)) return true;
      if (/^cinemagia/i.test(value)) return true;
      if (/^alege post/i.test(value)) return true;
      if (/^program tv/i.test(value)) return true;
      if (/^nu ai cont/i.test(value)) return true;
      if (/^login/i.test(value)) return true;
      if (/^cautare$/i.test(value)) return true;
      if (/^film(e)? la tv$/i.test(value)) return true;
      if (/^seriale la tv$/i.test(value)) return true;
      if (/^posturi favorite$/i.test(value)) return true;
      if (/^descopera filme$/i.test(value)) return true;
      if (/^\d{1,2}$/.test(value)) return true;
      if (/^\d+\/10$/.test(value)) return true;
      if (/^sezonul\s+\d+/i.test(value)) return true;
      if (/^episodul\s+\d+/i.test(value)) return true;
      if (/^\-+$/.test(value)) return true;
      if (/^\*+$/.test(value)) return true;
      if (/^(facebook|instagram|youtube|twitter|tiktok)$/i.test(value)) return true;
      if (value.length > 160) return true;
      return false;
    }

    function cleanProgramTitle(line) {
      return String(line || '')
        .replace(/^\[[^\]]+\]\s*/, '')
        .replace(/\s+\-\s+[^-]+$/u, '')
        .replace(/\s+\(R\)$/u, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    function textFromHtml(html) {
      const doc = new DOMParser().parseFromString(String(html || ''), 'text/html');
      doc.querySelectorAll('script, style, noscript, svg, iframe, form, header, footer').forEach((el) => el.remove());
      return (doc.body?.innerText || doc.documentElement?.innerText || '')
        .replace(/\u00a0/g, ' ');
    }

    function getBestProgramContainerText(html, channelName) {
      const doc = new DOMParser().parseFromString(String(html || ''), 'text/html');
      doc.querySelectorAll('script, style, noscript, svg, iframe, form, header, footer').forEach((el) => el.remove());
      const normalizedTarget = normalizeLooseName(channelAliasToProgramTv[normalizeChannelName(channelName)] || channelName);
      const elements = [...doc.querySelectorAll('main, section, article, div, td, li')];
      let bestText = '';
      let bestScore = -Infinity;
      for (const el of elements) {
        const text = (el.innerText || '').replace(/\u00a0/g, ' ').trim();
        if (!text || text.length < 80) continue;
        const times = text.match(/\b\d{1,2}:\d{2}\b/g) || [];
        if (times.length < 4) continue;
        const normalizedText = normalizeLooseName(text.slice(0, 3000));
        let score = times.length * 8 - Math.floor(text.length / 300);
        if (normalizedTarget && normalizedText.includes(normalizedTarget)) score += 50;
        const idClass = `${el.id || ''} ${el.className || ''}`.toLowerCase();
        if (/(program|tv|guide|orar|schedule|events|grid|content)/.test(idClass)) score += 10;
        if (text.length > 12000) score -= 10;
        if (score > bestScore) {
          bestScore = score;
          bestText = text;
        }
      }
      return bestText || textFromHtml(html);
    }

    function extractProgramPairsFromText(rawText) {
      const lines = String(rawText || '')
        .split(/\n+/)
        .map((line) => cleanProgramTitle(line))
        .filter(Boolean);

      const items = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!/^\d{1,2}:\d{2}$/.test(line)) continue;
        let title = '';
        for (let j = i + 1; j < Math.min(lines.length, i + 6); j++) {
          const next = lines[j];
          if (/^\d{1,2}:\d{2}$/.test(next)) break;
          if (isNoiseProgramLine(next)) continue;
          if (/^\d{1,2}$/.test(next)) continue;
          title = next;
          break;
        }
        title = cleanProgramTitle(title);
        if (!title || isNoiseProgramLine(title)) continue;
        items.push({ start: line, title });
      }
      return items;
    }

    function selectBestProgramRun(items) {
      const deduped = [];
      const seen = new Set();
      for (const item of items) {
        const key = `${item.start}|${item.title}`;
        if (seen.has(key)) continue;
        seen.add(key);
        deduped.push(item);
      }
      if (!deduped.length) return [];

      const toMinutes = (hhmm) => {
        const [h, m] = hhmm.split(':').map(Number);
        return h * 60 + m;
      };

      const runs = [];
      let current = [];
      for (const item of deduped) {
        const mins = toMinutes(item.start);
        if (!current.length) {
          current.push({ ...item, mins });
          continue;
        }
        const prev = current[current.length - 1];
        const diff = mins - prev.mins;
        const sameTitle = prev.title === item.title;
        if (diff > 0 && diff <= 300 && !sameTitle) {
          current.push({ ...item, mins });
        } else {
          if (current.length) runs.push(current);
          current = [{ ...item, mins }];
        }
      }
      if (current.length) runs.push(current);

      const scored = runs.map((run) => {
        const uniqueTitles = new Set(run.map((entry) => entry.title)).size;
        const penalties = run.filter((entry) => /^\d+$/.test(entry.title)).length * 5;
        const score = run.length * 10 + uniqueTitles * 2 - penalties;
        return { run, score };
      }).sort((a, b) => b.score - a.score);

      return (scored[0]?.run || []).map(({ mins, ...rest }) => rest);
    }

    async function loadProgramTvChannelIndex() {
      if (programTv.channelSlugs) return programTv.channelSlugs;
      const sourceUrl = encodeURIComponent('https://www.cinemagia.ro/program-tv/');
      const response = await fetch(`https://api.allorigins.win/raw?url=${sourceUrl}`, { cache: 'no-store' });
      if (!response.ok) throw new Error('Nu s-a putut incarca indexul Cinemagia');
      const text = await response.text();
      const slugMap = {};
      const re = /href=["']https?:\/\/www\.cinemagia\.ro\/program-tv\/([^"'#?\/]+)\/?["'][^>]*>([^<]{1,120})<\/a>/gi;
      let m;
      while ((m = re.exec(text)) !== null) {
        const slug = m[1].trim();
        const label = m[2].replace(/\s+/g, ' ').trim();
        if (!label || !slug) continue;
        if (['filme-la-tv', 'seriale-la-tv', 'grid', 'vertical'].includes(slug)) continue;
        const normalizedLabel = normalizeChannelName(label);
        const looseLabel = normalizeLooseName(label);
        slugMap[normalizedLabel] = slug;
        slugMap[normalizedLabel.replace(/\s+/g, '')] = slug;
        slugMap[looseLabel] = slug;
        slugMap[looseLabel.replace(/\s+/g, '')] = slug;
      }
      programTv.channelSlugs = slugMap;
      return slugMap;
    }

    async function withTimeout(promise, ms, fallbackValue) {
      let timer;
      try {
        return await Promise.race([
          promise,
          new Promise((resolve) => {
            timer = setTimeout(() => resolve(fallbackValue), ms);
          })
        ]);
      } finally {
        if (timer) clearTimeout(timer);
      }
    }
    function getQuickNow(channel) {
      const entries = getCinemagiaEntriesForChannel(channel);
      if (!entries.length) return null;
      const now = new Date();
      for (let i = 0; i < entries.length; i++) {
        const start = new Date(entries[i].start);
        const next = entries[i + 1] ? new Date(entries[i + 1].start) : null;
        if (start <= now && (!next || now < next)) {
          return { title: entries[i].title };
        }
      }
      return { title: entries[0].title };
    }

    function resolveProgramTvSlug(channel, slugMap) {
      if (!channel?.name) return null;
      if (directProgramTvSlugs[channel.name]) return directProgramTvSlugs[channel.name];

      const base = normalizeLooseName(channel.name);
      const alias = channelAliasToProgramTv[normalizeChannelName(channel.name)] || channelAliasToProgramTv[base] || null;
      const candidates = new Set();
      const pushCandidate = (value) => {
        if (!value) return;
        const loose = normalizeLooseName(value);
        if (!loose) return;
        candidates.add(loose);
        candidates.add(loose.replace(/\s+/g, ''));
      };

      pushCandidate(channel.name);
      pushCandidate(base);
      pushCandidate(base.replace(/\bhd\b/g, ' ').trim());
      if (alias) pushCandidate(alias);

      for (const key of candidates) {
        if (slugMap[key]) return slugMap[key];
      }

      const targetTokens = [...new Set((alias || base).split(' ').filter(Boolean))];
      let bestSlug = null;
      let bestScore = 0;
      for (const [key, slug] of Object.entries(slugMap)) {
        if (!key.includes(' ')) continue;
        const keyTokens = [...new Set(key.split(' ').filter(Boolean))];
        const overlap = targetTokens.filter((t) => keyTokens.includes(t)).length;
        const score = overlap / Math.max(targetTokens.length, keyTokens.length || 1);
        if (score > bestScore) {
          bestScore = score;
          bestSlug = slug;
        }
      }
      if (bestScore >= 0.5) return bestSlug;

      return (alias || base || '').replace(/\s+/g, '-');
    }

    function parseProgramTvSchedule(markup, channelName) {
      const containerText = getBestProgramContainerText(markup, channelName);
      const pairs = extractProgramPairsFromText(containerText);
      const bestRun = selectBestProgramRun(pairs);
      return bestRun.slice(0, 24);
    }

    async function fetchProgramTvForChannel(channel, { silent = false, force = false } = {}) {
      try {
        if (!channel?.name) return false;
        const existing = epgPrograms[channel.name] || [];
        if (!force && existing.length && !existing[0]?.synthetic) return true;
        if (programTv.loadingSlug.has(channel.name)) return false;
        programTv.loadingSlug.add(channel.name);

        let slugMap = {};
        try {
          slugMap = await loadProgramTvChannelIndex();
        } catch (e) {
          slugMap = {};
        }
        const slug = resolveProgramTvSlug(channel, slugMap);
        if (!slug) {
          if (!silent) epgState.mode = 'unavailable';
          return false;
        }

        const endpoints = [
          `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.cinemagia.ro/program-tv/${slug}/`)}`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.cinemagia.ro/program-tv/post/${slug}/`)}`
        ];

        let finalEntries = [];
        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint, { cache: 'no-store' });
            if (!response.ok) continue;
            const text = await response.text();
            const parsed = parseProgramTvSchedule(text, channel.name);
            if (parsed.length > finalEntries.length) finalEntries = parsed;
            if (finalEntries.length >= 5) break;
          } catch {}
        }

        if (!finalEntries.length) {
          if (!silent) epgState.mode = 'unavailable';
          return false;
        }

        const today = new Date();
        const isoDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        epgPrograms[channel.name] = finalEntries.map((entry) => ({
          start: `${isoDate}T${entry.start}:00`,
          title: entry.title,
          synthetic: false
        }));
        cinemagiaGuideMap[normalizeChannelName(channel.name)] = epgPrograms[channel.name];
        cinemagiaGuideMap[normalizeChannelName(channel.name).replace(/\s+/g, '')] = epgPrograms[channel.name];
        saveCinemagiaGuideCache(cinemagiaGuideMap);
        saveEpgCache();

        if (!silent || epgState.lastChannel?.name === channel.name) {
          epgState.mode = 'remote';
          epgState.updatedAt = new Date().toLocaleString('ro-RO', { hour12: false });
        }
        return true;
      } catch (e) {
        if (!silent) epgState.mode = 'unavailable';
        return false;
      } finally {
        if (channel?.name) programTv.loadingSlug.delete(channel.name);
      }
    }

    async function preloadDailyPrograms() {
      const priority = ['PROTV HD', 'A1 HD', 'NEWS24', 'HB0', 'TVR1', 'TVR2', 'TVR 3', 'REALITATEA TV', 'TV 1000'];
      const byName = new Map(channels.map((c) => [c.name, c]));
      const priorityChannels = priority.map((name) => byName.get(name)).filter(Boolean);
      const list = priorityChannels.concat(channels.filter((c) => !priority.includes(c.name)));
      const concurrency = 4;
      let idx = 0;
      const worker = async () => {
        while (idx < list.length) {
          const current = list[idx++];
          await fetchProgramTvForChannel(current, { silent: true, force: true }).catch(() => false);
        }
      };
      await Promise.all(Array.from({ length: Math.min(concurrency, list.length) }, worker));
    }

    function updateGuide(channel, { scrollToNow = false } = {}) {
      if (!channel) {
        updateGuideStatus();
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Selecteaza un canal</span></div>';
        return;
      }

      const items = (epgPrograms[channel.name] || []).slice().sort((a, b) => new Date(a.start) - new Date(b.start));
      if (items.length) {
        const now = new Date();
        const hhmm = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        const rows = [];
        let currentShow = null;
        let nextShow = null;

        for (let i = 0; i < items.length; i++) {
          const current = items[i];
          const start = new Date(current.start);
          const next = items[i + 1] ? new Date(items[i + 1].start) : null;
          const isNow = start <= now && (!next || now < next);
          const label = isNow ? 'Acum' : hhmm(start);
          if (isNow) {
            currentShow = current.title;
            nextShow = items[i + 1]?.title || null;
          }
          rows.push(`<div class="guide-row ${isNow ? 'now' : ''}"><span class="guide-time">${label}</span><span class="guide-show">${current.title}</span></div>`);
        }
        if (!currentShow) {
          currentShow = items[0]?.title || '-';
          nextShow = items[1]?.title || null;
        }
        els.playerMeta.textContent = `Acum: ${currentShow || '-'} • Next: ${nextShow || '-'}`;

        updateGuideStatus();
        els.guideList.innerHTML = rows.join('');
        if (scrollToNow) {
          const currentRow = els.guideList.querySelector('.guide-row.now');
          if (currentRow) {
            const targetTop = Math.max(0, currentRow.offsetTop - 8);
            els.guideList.scrollTop = targetTop;
          }
        }
        return;
      }


      if (epgState.mode === 'loading' || Date.now() < epgState.loadingUntil) {
        updateGuideStatus();
        els.playerMeta.textContent = 'Acum: se incarca... • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">...</span><span class="guide-show">Actualizez programul pentru acest post...</span></div>';
        return;
      }

      epgState.mode = 'unavailable';
      updateGuideStatus();
      const quickNow = getQuickNow(channel);
      if (quickNow?.title) {
        els.playerMeta.textContent = `Acum: ${quickNow.title} • Next: -`;
        els.guideList.innerHTML = `<div class="guide-row now"><span class="guide-time">Acum</span><span class="guide-show">${quickNow.title}</span></div>`;
      } else {
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">N/A</span><span class="guide-show">Nu sunt date de program pentru acest post.</span></div>';
      }
    }

    function updateGuideStatus() {
      const now = new Date();
      const stamp = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      if (epgState.mode === 'remote' && epgState.updatedAt) {
        els.guideStatus.classList.add('live');
        els.guideStatus.textContent = `Program actualizat (${epgState.updatedAt}) • ${stamp}`;
      } else if (epgState.mode === 'loading') {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Actualizez datele... ${stamp}`;
      } else if (epgState.mode === 'unavailable') {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Nu sunt date de program • ${stamp}`;
      } else {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Astept selectia unui canal • ${stamp}`;
      }
    }

    async function loadEpgData() {
      try {
        epgState.mode = 'loading';
        epgState.loadingUntil = Date.now() + 700;
        updateGuideStatus();
        epgPrograms = {};
        cinemagiaGuideMap = buildCinemagiaGuideMap(loadCinemagiaGuideCache());
        hydrateProgramsFromCinemagiaMap();
        epgState.mode = Object.keys(epgPrograms).length ? 'remote' : 'idle';
        epgState.updatedAt = null;
      } catch (error) {
        epgPrograms = {};
        cinemagiaGuideMap = {};
        epgState.mode = 'fallback';
      } finally {
        if (epgState.lastChannel) updateGuide(epgState.lastChannel, { scrollToNow: true });
        else updateGuideStatus();
      }
    }

    function filteredChannels() {
      const q = appState.search.toLowerCase();
      return orderedChannels()
        .filter(c => appState.category === 'all' || c.category === appState.category)
        .filter(c => c.name.toLowerCase().includes(q) || c.description.toLowerCase().includes(q))
        .filter(c => !appState.favoritesOnly || isFavorite(c.name));
    }

    function navigateFavorite(step) {
      const favorites = orderedChannels().filter((c) => isFavorite(c.name));
      if (!favorites.length) {
        els.playerMeta.textContent = 'Nu ai canale favorite. Marcheaza canale cu ★.';
        return;
      }
      const currentIndex = favorites.findIndex((c) => c.name === appState.playing);
      const nextIndex = currentIndex === -1
        ? 0
        : (currentIndex + step + favorites.length) % favorites.length;
      openStream(favorites[nextIndex]);
    }

    function isPlayerFullscreen() {
      return document.fullscreenElement === els.playerFrame || document.webkitFullscreenElement === els.playerFrame;
    }

    async function togglePlayerFullscreen() {
      try {
        if (!isPlayerFullscreen()) {
          await (els.playerFrame.requestFullscreen?.() || els.playerFrame.webkitRequestFullscreen?.());
        } else {
          await (document.exitFullscreen?.() || document.webkitExitFullscreen?.());
        }
      } catch (err) {
        console.warn('Fullscreen indisponibil pentru acest browser', err);
      }
    }

    function initialsForChannel(name) {
      const cleaned = String(name || '')
        .replace(/\b(HD|TV)\b/gi, '')
        .replace(/[^A-Za-z0-9 ]+/g, ' ')
        .trim();
      const parts = cleaned.split(/\s+/).filter(Boolean);
      if (!parts.length) return 'TV';
      const compact = parts.slice(0, 2).map((part) => part[0]).join('');
      return (compact || cleaned.slice(0, 2) || 'TV').toUpperCase();
    }

    function getLogoHtml(channelName) {
      const logoUrl = channelLogos[channelName];
      const initials = initialsForChannel(channelName);
      if (!logoUrl) return `<span class="tv-logo-fallback" aria-hidden="true">${initials}</span>`;
      return `<img class="tv-logo" src="${logoUrl}" alt="${channelName} logo" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'tv-logo-fallback',textContent:'${initials}','ariaHidden':'true'}));" />`;
    }

    function render() {
      const list = filteredChannels();
      els.grid.innerHTML = '';
      if (!list.length) { els.grid.innerHTML = '<div class="empty">Nu exista canale pentru filtrul selectat.</div>'; return; }

      for (const c of list) {
        const card = document.createElement('article');
        card.className = `card ${appState.playing === c.name ? 'active' : ''}`;
        card.draggable = true;
        card.dataset.channel = c.name;
        const logoHtml = getLogoHtml(c.name);
        card.innerHTML = `
          <div class="card-header"><div class="title-row">${logoHtml}<h3 class="title">${c.name}</h3></div><span class="badge">${c.category}</span></div>
          <p class="desc">${c.description}</p>
          <div class="actions">
            <button class="open" type="button">▶ Open stream</button>
            <button class="fav ${isFavorite(c.name) ? 'active' : ''}" type="button" title="Favorite">★</button>
          </div>
        `;
        card.querySelector('.open').addEventListener('click', (e) => { e.stopPropagation(); openStream(c); });
        card.addEventListener('click', () => openStream(c));
        card.querySelector('.fav').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(c.name); });
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer?.setData('text/plain', c.name);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const dragged = e.dataTransfer?.getData('text/plain');
          if (!dragged || dragged === c.name) return;
          moveChannelBefore(dragged, c.name);
          render();
        });
        els.grid.append(card);
      }
      els.showFav.classList.toggle('active', appState.favoritesOnly);
    }

    function initCategories() {
      const categories = [...new Set(channels.map(c => c.category))].sort();
      for (const cat of categories) {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        els.category.append(opt);
      }
    }

    els.search.addEventListener('input', (e) => { appState.search = e.target.value.trim(); render(); });
    els.category.addEventListener('change', (e) => { appState.category = e.target.value; render(); });
    els.showFav.addEventListener('click', () => { appState.favoritesOnly = !appState.favoritesOnly; render(); });
    els.goToProgram.addEventListener('click', () => focusPanel(els.tvGuide));
    els.playerFullscreenBtn.addEventListener('click', togglePlayerFullscreen);
    els.prevFavBtn.addEventListener('click', () => navigateFavorite(-1));
    els.nextFavBtn.addEventListener('click', () => navigateFavorite(1));
    els.playerWrap.addEventListener('dblclick', togglePlayerFullscreen);
    els.playerFrame.addEventListener('dblclick', togglePlayerFullscreen);
    document.getElementById('appVersion').textContent = `v${APP_VERSION}`;
    console.info(`IPTV Quick Grid version ${APP_VERSION}`);
    initCategories();
    render();
    loadEpgData().then(async () => {
      await Promise.allSettled([withTimeout(preloadDailyPrograms(), 1800, null)]);
      const startupChannel = channels[0];
      if (startupChannel) {
        openStream(startupChannel, { focus: false });
      } else {
        updateGuide(null);
      }
      if (epgState.lastChannel) updateGuide(epgState.lastChannel, { scrollToNow: true });
    });

    setInterval(() => {
      const active = epgState.lastChannel;
      if (active) {
        fetchProgramTvForChannel(active, { silent: true, force: true })
          .finally(() => {
            if (epgState.lastChannel?.name === active.name) updateGuide(active);
          });
      } else {
        updateGuideStatus();
      }
    }, 5 * 60 * 1000);

    setInterval(() => {
      if (epgState.lastChannel) updateGuide(epgState.lastChannel);
      else updateGuideStatus();
    }, 60000);
  </script>
