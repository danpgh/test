  <title>IPTV Quick Grid</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 14px;
      padding-right: 14px;
      padding-bottom: 28px;
    }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    h1 { margin:0 0 6px; font-size:1.15rem; }
    .hint { margin:0; color:var(--muted); font-size:.9rem; }
    .top { display:grid; gap:10px; margin-bottom:12px; }
    .controls { display:grid; grid-template-columns:auto 1fr 220px auto; gap:8px; }
    input,select { width:100%; border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px 12px; outline:none; }
    button { border:1px solid var(--border); border-radius:0 !important; background:#131a2d; color:var(--text); padding:7px 9px; font-size:.82rem; cursor:pointer; min-height:38px; }
    button.active { border-color:var(--accent); color:#dce4ff; }
    .notice { color:#bfcef8; font-size:.84rem; line-height:1.35; }
    .quick-nav { display:flex; gap:8px; flex-wrap:wrap; }
    .quick-nav button { padding:5px 10px; font-weight:600; min-width:112px; }
    .quick-nav button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

    .panel-focus {
      box-shadow: 0 0 0 2px rgba(111,140,255,.75), 0 14px 30px rgba(0,0,0,.45);
      transition: box-shadow .25s ease;
    }
    .media-row {
      display:grid;
      grid-template-columns:minmax(520px, 1.55fr) minmax(320px, 0.95fr);
      gap:10px;
      align-items:start;
      margin-bottom:12px;
    }
    .player {
      width: 100%;
      margin: 0;
      background:rgba(10,14,24,.95);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:visible;
      box-shadow:0 14px 30px rgba(0,0,0,.45);
      position: relative;
      z-index: 2;
    }
    .tv-guide {
      width: 100%;
      position: relative;
      margin: 0;
      z-index: 1;
      background: rgba(10,14,24,.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 12px 22px rgba(0,0,0,.35);
    }
    .guide-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
    .guide-title { margin: 0; font-size: 1.28rem; color: #c9d3f7; font-weight:700; }
    .guide-badge { font-size:1.05rem; border:1px solid #3a4a7b; background:#1a2444; color:#ccdaff; border-radius:999px; padding:4px 10px; }
    .guide-badge.live { border-color:#2f8762; background:#123527; color:#8df0be; }
    .guide-list { max-height: 360px; overflow-y: auto; padding-right: 4px; }
    .guide-row { display: grid; grid-template-columns: 92px 1fr; gap: 10px; font-size: 1.16rem; margin-bottom: 10px; }
    .guide-row.now .guide-time { color: #8df0be; font-weight: 700; }
    .guide-row.now .guide-show { color: #f2fff8; }
    .guide-time { color: #9db0eb; }
    .guide-show { color: #e1e8ff; line-height:1.35; }
    .player-head { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:8px 10px; }
    .player-title { margin:0; font-size:.95rem; }
    .player-tools { display:flex; align-items:center; gap:8px; }
    .player-meta { color:var(--muted); font-size:.82rem; }
    .player-ch { min-height:30px; padding:5px 10px; font-size:.72rem; font-weight:700; }
    .player-wrap {
      position:relative;
      border-top:1px solid var(--border);
      overflow:visible;
      background:#000;
      aspect-ratio:16/9;
      min-height: 360px;
      max-height: 520px;
      padding-right: 0;
    }
    .player-frame {
      width: calc(100% + 28px);
      margin-left: -14px;
      height:100%;
      border:0;
      background:#000;
    }
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px; display:grid; gap:6px; min-height:96px; cursor:pointer; }
    .card.dragging { opacity:.5; border-style:dashed; }
    .title-row { display:flex; align-items:center; gap:8px; }
    .tv-logo { width:22px; height:22px; object-fit:contain; border-radius:3px; background:#0d1323; border:1px solid #2a365a; padding:2px; }
    .tv-logo-fallback {
      width:22px;
      height:22px;
      border-radius:3px;
      border:1px solid #2a365a;
      display:grid;
      place-items:center;
      font-size:.55rem;
      color:#dce6ff;
      background:linear-gradient(180deg,#253667,#1a2444);
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .card.active { border-color:var(--accent); }
    .card-header { display:flex; align-items:start; justify-content:space-between; gap:8px; }
    .title { margin:0; font-size:.82rem; line-height:1.2; }
    .badge { font-size:.62rem; color:#c7d3ff; background:#222c49; border:1px solid #3a4a7b; border-radius:999px; padding:1px 6px; white-space:nowrap; }
    .desc { margin:0; font-size:.68rem; color:var(--muted); line-height:1.2; }
    .actions { display:flex; gap:5px; margin-top:auto; }
    .open { flex:1; background:linear-gradient(180deg,#5e79f5,#4a63cf); border-color:#4861ca; color:#f1f4ff; font-weight:600; font-size:.72rem; }
    .fav { width:32px; height:32px; padding:0; }
    .fav.active { color:var(--fav); border-color:var(--fav); }
    .empty { color:var(--muted); text-align:center; padding:20px 0; }

    @media (max-width:1400px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } }
    @media (max-width:1160px) {
      .grid { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .guide-list { max-height: 280px; }
      .player-wrap { min-height: 300px; max-height: 400px; }
    }
    @media (max-width:900px) {
      .controls { grid-template-columns:1fr; }
      .media-row { grid-template-columns:1fr; }
      .grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
      .wrap { padding-bottom: 230px; }
    }
    @media (max-width:680px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:430px) {
      .grid { grid-template-columns:1fr; }
      .guide-list { max-height: 180px; }
      .player-wrap { min-height: 220px; max-height: 280px; }
      .wrap { padding-bottom: 20px; }
    }
  </style>

    function saveState() {
      localStorage.setItem('iptv-favorites', JSON.stringify([...appState.favorites]));
    }

    function orderedChannels() {
      if (!appState.order.length) return channels.slice();
      const rank = new Map(appState.order.map((name, idx) => [name, idx]));
      return channels.slice().sort((a, b) => (rank.get(a.name) ?? 9999) - (rank.get(b.name) ?? 9999) || a.name.localeCompare(b.name));
    }

    function saveOrder() {
      localStorage.setItem('iptv-order', JSON.stringify(appState.order));
    }

    function moveChannelBefore(draggedName, targetName) {
      const list = orderedChannels().map(c => c.name);
      const from = list.indexOf(draggedName);
      const to = list.indexOf(targetName);
      if (from === -1 || to === -1 || from === to) return;
      const [item] = list.splice(from, 1);
      list.splice(to, 0, item);
      appState.order = list;
      saveOrder();
    }

    function isFavorite(name) {
      return appState.favorites.has(name);
    }

    function toggleFavorite(name) {
      appState.favorites.has(name) ? appState.favorites.delete(name) : appState.favorites.add(name);
      saveState();
      render();
    }

    function normalizeChannelName(name) {
      return String(name || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/0/g, 'o')
        .replace(/1/g, 'i')
        .replace(/\+/g, ' plus ')
        .replace(/&/g, ' and ')
        .replace(/\bcnn\b/g, ' cnn ')
        .replace(/\bhd\b/g, ' ')
        .replace(/\btv\b/g, ' tv ')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function tokenSet(value) {
      return new Set(normalizeChannelName(value).split(' ').filter(Boolean));
    }

    function buildNameCandidates(channelName) {
      const direct = preferredXmlNames[channelName] || [];
      const normalized = normalizeChannelName(channelName);
      const noSpaces = normalized.replace(/\s+/g, '');
      const out = new Set([normalized, noSpaces]);
      for (const item of direct) {
        const n = normalizeChannelName(item);
        out.add(n);
        out.add(n.replace(/\s+/g, ''));
      }
      if (normalized.includes('hbo')) {
        out.add(normalized.replace('hbo', 'hb0'));
        out.add(normalized.replace('hbo', 'hb0').replace(/\s+/g, ''));
      }
      return [...out].filter(Boolean);
    }

    function scoreXmlName(localName, xmlName) {
      const localCandidates = buildNameCandidates(localName);
      const xmlNorm = normalizeChannelName(xmlName);
      const xmlCompact = xmlNorm.replace(/\s+/g, '');
      if (!xmlNorm) return 0;

      for (const candidate of localCandidates) {
        if (candidate === xmlNorm || candidate === xmlCompact) return 100;
      }

      const localTokens = tokenSet(localName);
      const xmlTokens = tokenSet(xmlName);
      if (!localTokens.size || !xmlTokens.size) return 0;

      let overlap = 0;
      for (const token of localTokens) {
        if (xmlTokens.has(token)) overlap++;
      }

      let score = (overlap / Math.max(localTokens.size, xmlTokens.size)) * 60;

      const bestCandidate = localCandidates.find(candidate =>
        candidate && (xmlNorm.includes(candidate) || xmlCompact.includes(candidate) || candidate.includes(xmlNorm))
      );
      if (bestCandidate) score += 25;

      if (/\b\d\b/.test(normalizeChannelName(localName))) {
        const localNumber = (normalizeChannelName(localName).match(/\b(\d)\b/) || [])[1];
        const xmlNumber = (xmlNorm.match(/\b(\d)\b/) || [])[1];
        if (localNumber && xmlNumber) {
          score += localNumber === xmlNumber ? 12 : -25;
        }
      }

      if (xmlNorm.includes('radio')) score -= 20;
      if (xmlNorm.includes('international') && !normalizeChannelName(localName).includes('international')) score -= 8;

      return score;
    }

    function parseXmltvDate(value) {
      const text = String(value || '').trim();
      const match = text.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s*([+\-]\d{4})?$/);
      if (!match) return null;
      const [, y, mo, d, h, mi, s, tz] = match;
      const iso = `${y}-${mo}-${d}T${h}:${mi}:${s}${tz ? `${tz.slice(0,3)}:${tz.slice(3)}` : ''}`;
      const date = new Date(iso);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatClock(date) {
      return date.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatStamp(date) {
      return date.toLocaleString('ro-RO', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function buildStreamUrl(url) {
      const u = new URL(url);
      u.searchParams.set('autoplay', '1');
      u.searchParams.set('muted', '1');
      return u.toString();
    }

    function focusPanel(panel) {
      if (!panel) return;
      panel.classList.add('panel-focus');
      setTimeout(() => panel.classList.remove('panel-focus'), 1200);
      panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function getProgramsForChannel(channelName) {
      return epgState.programsByChannel[channelName] || [];
    }

    function updateGuideStatus(extraText = '') {
      const nowText = formatClock(new Date());
      if (epgState.mode === 'loading') {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Se incarca programul XMLTV... • ${nowText}`;
        return;
      }
      if (epgState.mode === 'ready' && epgState.updatedAt) {
        els.guideStatus.classList.add('live');
        const source = epgState.sourceUsed ? ` • sursa: ${epgState.sourceUsed}` : '';
        els.guideStatus.textContent = `Program actualizat (${formatStamp(epgState.updatedAt)})${source} • ${nowText}${extraText ? ' • ' + extraText : ''}`;
        return;
      }
      if (epgState.mode === 'error') {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Nu s-a putut incarca ghidul TV • ${nowText}`;
        return;
      }
      els.guideStatus.classList.remove('live');
      els.guideStatus.textContent = `Astept selectia unui canal • ${nowText}`;
    }

    function updateGuide(channel, { scrollToNow = false } = {}) {
      if (!channel) {
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Selecteaza un canal</span></div>';
        updateGuideStatus();
        return;
      }

      const items = getProgramsForChannel(channel.name).slice().sort((a, b) => new Date(a.start) - new Date(b.start));
      if (!items.length) {
        const matchName = epgState.matchedXmlNameByChannel[channel.name];
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = `<div class="guide-row"><span class="guide-time">N/A</span><span class="guide-show">Nu sunt date de program pentru acest post${matchName ? ` (mapat la ${matchName})` : ''}.</span></div>`;
        updateGuideStatus(matchName ? `mapat: ${matchName}` : '');
        return;
      }

      const now = new Date();
      let currentShow = null;
      let nextShow = null;
      const rows = items.map((item, idx) => {
        const start = new Date(item.start);
        const next = items[idx + 1] ? new Date(items[idx + 1].start) : null;
        const isNow = start <= now && (!next || now < next);
        if (isNow) {
          currentShow = item.title;
          nextShow = items[idx + 1]?.title || null;
        }
        const label = isNow ? 'Acum' : formatClock(start);
        return `<div class="guide-row ${isNow ? 'now' : ''}"><span class="guide-time">${label}</span><span class="guide-show">${escapeHtml(item.title)}${item.details ? `<br><small style="color:#98a3c7;">${escapeHtml(item.details)}</small>` : ''}</span></div>`;
      });

      if (!currentShow) {
        currentShow = items[0]?.title || '-';
        nextShow = items[1]?.title || null;
      }

      els.playerMeta.textContent = `Acum: ${currentShow || '-'} • Next: ${nextShow || '-'}`;
      els.guideList.innerHTML = rows.join('');
      const matchName = epgState.matchedXmlNameByChannel[channel.name];
      updateGuideStatus(matchName ? `mapat: ${matchName}` : '');

      if (scrollToNow) {
        const currentRow = els.guideList.querySelector('.guide-row.now');
        if (currentRow) {
          els.guideList.scrollTop = Math.max(0, currentRow.offsetTop - 8);
        } else {
          els.guideList.scrollTop = 0;
        }
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function openStream(channel, { autoLaunch = false, focus = true } = {}) {
      appState.playing = channel.name;
      epgState.lastChannel = channel;
      els.playerTitle.textContent = channel.name;
      const directUrl = buildStreamUrl(channel.embed);
      if (els.playerFrame.src !== directUrl) {
        els.playerFrame.src = directUrl;
      }
      if (autoLaunch) {
        const opened = window.open(directUrl, '_blank', 'noopener');
        if (!opened) els.playerMeta.textContent = `${channel.category} • popup blocat`;
      }
      if (focus) focusPanel(els.playerPanel);
      updateGuide(channel, { scrollToNow: true });
      render();
    }

    function filteredChannels() {
      const q = appState.search.toLowerCase();
      return orderedChannels()
        .filter(c => appState.category === 'all' || c.category === appState.category)
        .filter(c => c.name.toLowerCase().includes(q) || c.description.toLowerCase().includes(q))
        .filter(c => !appState.favoritesOnly || isFavorite(c.name));
    }

    function navigateFavorite(step) {
      const favorites = orderedChannels().filter((c) => isFavorite(c.name));
      if (!favorites.length) {
        els.playerMeta.textContent = 'Nu ai canale favorite. Marcheaza canale cu ★.';
        return;
      }
      const currentIndex = favorites.findIndex((c) => c.name === appState.playing);
      const nextIndex = currentIndex === -1 ? 0 : (currentIndex + step + favorites.length) % favorites.length;
      openStream(favorites[nextIndex]);
    }

    function isPlayerFullscreen() {
      return document.fullscreenElement === els.playerFrame || document.webkitFullscreenElement === els.playerFrame;
    }

    async function togglePlayerFullscreen() {
      try {
        if (!isPlayerFullscreen()) {
          await (els.playerFrame.requestFullscreen?.() || els.playerFrame.webkitRequestFullscreen?.());
        } else {
          await (document.exitFullscreen?.() || document.webkitExitFullscreen?.());
        }
      } catch (err) {
        console.warn('Fullscreen indisponibil', err);
      }
    }

    function initialsForChannel(name) {
      const cleaned = String(name || '')
        .replace(/\b(HD|TV)\b/gi, '')
        .replace(/[^A-Za-z0-9 ]+/g, ' ')
        .trim();
      const parts = cleaned.split(/\s+/).filter(Boolean);
      if (!parts.length) return 'TV';
      return parts.slice(0, 2).map((part) => part[0]).join('').toUpperCase();
    }

    function getLogoHtml(channelName) {
      const logoUrl = channelLogos[channelName];
      const initials = initialsForChannel(channelName);
      if (!logoUrl) return `<span class="tv-logo-fallback" aria-hidden="true">${initials}</span>`;
      return `<img class="tv-logo" src="${logoUrl}" alt="${channelName} logo" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'tv-logo-fallback',textContent:'${initials}','ariaHidden':'true'}));" />`;
    }

    function render() {
      const list = filteredChannels();
      els.grid.innerHTML = '';
      if (!list.length) {
        els.grid.innerHTML = '<div class="empty">Nu exista canale pentru filtrul selectat.</div>';
        return;
      }

      for (const c of list) {
        const card = document.createElement('article');
        card.className = `card ${appState.playing === c.name ? 'active' : ''}`;
        card.draggable = true;
        card.dataset.channel = c.name;
        const logoHtml = getLogoHtml(c.name);
        const hasGuide = !!getProgramsForChannel(c.name).length;
        const mapped = epgState.matchedXmlNameByChannel[c.name];
        card.innerHTML = `
          <div class="card-header"><div class="title-row">${logoHtml}<h3 class="title">${c.name}</h3></div><span class="badge">${c.category}</span></div>
          <p class="desc">${c.description}</p>
          <p class="desc" style="margin-top:-2px;">${hasGuide ? 'Program disponibil' : (mapped ? `Mapat: ${mapped}` : 'Fara EPG')}</p>
          <div class="actions">
            <button class="open" type="button">▶ Open stream</button>
            <button class="fav ${isFavorite(c.name) ? 'active' : ''}" type="button" title="Favorite">★</button>
          </div>
        `;
        card.querySelector('.open').addEventListener('click', (e) => { e.stopPropagation(); openStream(c); });
        card.addEventListener('click', () => openStream(c));
        card.querySelector('.fav').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(c.name); });
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer?.setData('text/plain', c.name);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const dragged = e.dataTransfer?.getData('text/plain');
          if (!dragged || dragged === c.name) return;
          moveChannelBefore(dragged, c.name);
          render();
        });
        els.grid.append(card);
      }
      els.showFav.classList.toggle('active', appState.favoritesOnly);
    }

    function initCategories() {
      const seen = new Set([...els.category.options].map(o => o.value));
      const categories = [...new Set(channels.map(c => c.category))].sort();
      for (const cat of categories) {
        if (seen.has(cat)) continue;
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        els.category.append(opt);
      }
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(EPG_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        if (!parsed.fetchedAt || !parsed.programsByChannel) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function saveCache() {
      try {
        localStorage.setItem(EPG_CACHE_KEY, JSON.stringify({
          fetchedAt: Date.now(),
          updatedAt: epgState.updatedAt ? epgState.updatedAt.toISOString() : null,
          sourceUsed: epgState.sourceUsed,
          programsByChannel: epgState.programsByChannel,
          matchedXmlNameByChannel: epgState.matchedXmlNameByChannel,
          matchedXmlIdByChannel: epgState.matchedXmlIdByChannel,
          unresolvedChannels: epgState.unresolvedChannels
        }));
      } catch {}
    }

    function applyCache(cache) {
      epgState.programsByChannel = cache.programsByChannel || {};
      epgState.matchedXmlNameByChannel = cache.matchedXmlNameByChannel || {};
      epgState.matchedXmlIdByChannel = cache.matchedXmlIdByChannel || {};
      epgState.unresolvedChannels = cache.unresolvedChannels || [];
      epgState.updatedAt = cache.updatedAt ? new Date(cache.updatedAt) : null;
      epgState.sourceUsed = cache.sourceUsed || null;
      epgState.mode = 'ready';
    }

    async function fetchXmlText() {
      let lastError = null;
      for (const source of XMLTV_SOURCES) {
        try {
          const response = await fetch(source, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          if (!text || !text.includes('<tv') || !text.includes('<programme')) {
            throw new Error('XML invalid');
          }
          epgState.sourceUsed = source.replace(/^https?:\/\//, '');
          return text;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error('Nu s-a putut incarca XMLTV');
    }

    function resolveXmlChannels(doc) {
      const xmlChannels = [...doc.querySelectorAll('channel')].map((node) => {
        const id = node.getAttribute('id') || '';
        const displayNames = [...node.querySelectorAll('display-name')].map((n) => n.textContent?.trim()).filter(Boolean);
        return { id, displayNames };
      }).filter(item => item.id && item.displayNames.length);

      const matchedIds = new Set();
      const matchedNames = {};
      const matchedIdByLocal = {};
      const unresolved = [];

      for (const local of channels) {
        let best = null;
        let bestScore = 0;

        for (const xml of xmlChannels) {
          for (const displayName of xml.displayNames) {
            const score = scoreXmlName(local.name, displayName);
            if (score > bestScore) {
              bestScore = score;
              best = { id: xml.id, name: displayName };
            }
          }
        }

        if (best && bestScore >= 65) {
          matchedIds.add(best.id);
          matchedNames[local.name] = best.name;
          matchedIdByLocal[local.name] = best.id;
        } else {
          unresolved.push(local.name);
        }
      }

      epgState.matchedXmlNameByChannel = matchedNames;
      epgState.matchedXmlIdByChannel = matchedIdByLocal;
      epgState.unresolvedChannels = unresolved;
      return matchedIds;
    }

    function buildProgramsFromXml(doc) {
      const matchedIds = resolveXmlChannels(doc);
      const today = new Date();
      const horizon = new Date(today.getTime() + 24 * 60 * 60 * 1000);
      const byId = {};

      for (const programme of [...doc.querySelectorAll('programme')]) {
        const channelId = programme.getAttribute('channel') || '';
        if (!matchedIds.has(channelId)) continue;

        const start = parseXmltvDate(programme.getAttribute('start'));
        const stop = parseXmltvDate(programme.getAttribute('stop'));
        if (!start) continue;
        if (stop && stop < new Date(today.getTime() - 2 * 60 * 60 * 1000)) continue;
        if (start > horizon) continue;

        const title = programme.querySelector('title')?.textContent?.trim();
        if (!title) continue;
        const desc = programme.querySelector('desc')?.textContent?.trim() || '';
        const category = programme.querySelector('category')?.textContent?.trim() || '';

        if (!byId[channelId]) byId[channelId] = [];
        byId[channelId].push({
          start: start.toISOString(),
          stop: stop ? stop.toISOString() : null,
          title,
          details: [category, desc].filter(Boolean).join(' • ').slice(0, 220)
        });
      }

      const programsByChannel = {};
      for (const channel of channels) {
        const xmlId = epgState.matchedXmlIdByChannel[channel.name];
        const items = (byId[xmlId] || []).sort((a, b) => new Date(a.start) - new Date(b.start));
        programsByChannel[channel.name] = items;
      }
      epgState.programsByChannel = programsByChannel;
    }

    async function refreshEpg({ background = false } = {}) {
      if (epgState.refreshInFlight) return false;
      epgState.refreshInFlight = true;
      if (!background) {
        epgState.mode = 'loading';
        updateGuideStatus();
      }
      try {
        const xmlText = await fetchXmlText();
        const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
        if (doc.querySelector('parsererror')) throw new Error('Parser XMLTV invalid');
        buildProgramsFromXml(doc);
        epgState.updatedAt = new Date();
        epgState.mode = 'ready';
        saveCache();
        render();
        if (epgState.lastChannel) updateGuide(epgState.lastChannel, { scrollToNow: true });
        else updateGuideStatus();
        return true;
      } catch (error) {
        console.error('EPG refresh failed', error);
        if (!epgState.updatedAt) {
          epgState.mode = 'error';
          updateGuideStatus();
        }
        return false;
      } finally {
        epgState.refreshInFlight = false;
      }
    }

    async function initializeEpg() {
      const cache = loadCache();
      if (cache) {
        applyCache(cache);
        render();
        if (epgState.lastChannel) updateGuide(epgState.lastChannel);
        else updateGuideStatus();
        if (Date.now() - cache.fetchedAt > EPG_CACHE_MAX_AGE_MS) {
          refreshEpg({ background: true });
        }
      } else {
        epgState.mode = 'loading';
        updateGuideStatus();
        await refreshEpg();
      }
    }

    els.search.addEventListener('input', (e) => { appState.search = e.target.value.trim(); render(); });
    els.category.addEventListener('change', (e) => { appState.category = e.target.value; render(); });
    els.showFav.addEventListener('click', () => { appState.favoritesOnly = !appState.favoritesOnly; render(); });
    els.goToProgram.addEventListener('click', () => focusPanel(els.tvGuide));
    els.playerFullscreenBtn.addEventListener('click', togglePlayerFullscreen);
    els.prevFavBtn.addEventListener('click', () => navigateFavorite(-1));
    els.nextFavBtn.addEventListener('click', () => navigateFavorite(1));
    els.playerWrap.addEventListener('dblclick', togglePlayerFullscreen);
    els.playerFrame.addEventListener('dblclick', togglePlayerFullscreen);

    document.getElementById('appVersion').textContent = `v${APP_VERSION}`;
    console.info(`IPTV Quick Grid version ${APP_VERSION}`);
    initCategories();
    render();
    initializeEpg().then(() => {
      const startupChannel = channels[0];
      if (startupChannel) {
        openStream(startupChannel, { focus: false });
      } else {
        updateGuide(null);
      }
    });

    setInterval(() => {
      if (epgState.lastChannel) updateGuide(epgState.lastChannel);
      else updateGuideStatus();
    }, 60000);

    setInterval(() => {
      refreshEpg({ background: true });
    }, EPG_BACKGROUND_REFRESH_MS);
  </script>


</body></html>
