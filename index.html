<html lang="ro"><head><meta charset="UTF-8">

<title>IPTV Quick Grid</title>
<style>
:root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
* { box-sizing:border-box; }
body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
.wrap { max-width:1600px; margin:0 auto; padding:14px 14px 28px; }
.panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
.hint { margin:0; color:var(--muted); font-size:.9rem; }
.top { display:grid; gap:10px; margin-bottom:12px; }
.controls { display:grid; grid-template-columns:auto 1fr 220px auto; gap:8px; }
input,select { width:100%; border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px 12px; outline:none; }
button { border:1px solid var(--border); border-radius:0 !important; background:#131a2d; color:var(--text); padding:7px 9px; font-size:.82rem; cursor:pointer; min-height:38px; }
button.active { border-color:var(--accent); color:#dce4ff; }
.panel-focus { box-shadow:0 0 0 2px rgba(111,140,255,.75), 0 14px 30px rgba(0,0,0,.45); transition:box-shadow .25s ease; }
.media-row { display:grid; grid-template-columns:minmax(520px,1.55fr) minmax(320px,.95fr); gap:10px; align-items:start; margin-bottom:12px; }
.player { width:100%; margin:0; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; overflow:visible; box-shadow:0 14px 30px rgba(0,0,0,.45); position:relative; z-index:2; }
.tv-guide { width:100%; position:relative; margin:0; z-index:1; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; padding:8px; box-shadow:0 12px 22px rgba(0,0,0,.35); }
.guide-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
.guide-title { margin:0; font-size:1.28rem; color:#c9d3f7; font-weight:700; }
.guide-badge { font-size:.92rem; border:1px solid #3a4a7b; background:#1a2444; color:#ccdaff; border-radius:999px; padding:4px 10px; }
.guide-badge.live { border-color:#2f8762; background:#123527; color:#8df0be; }
.guide-list { max-height:360px; overflow-y:auto; padding-right:4px; }
.guide-row { display:grid; grid-template-columns:92px 1fr; gap:10px; font-size:1rem; margin-bottom:10px; }
.guide-row.now .guide-time { color:#8df0be; font-weight:700; }
.guide-row.now .guide-show { color:#f2fff8; }
.guide-time { color:#9db0eb; }
.guide-show { color:#e1e8ff; line-height:1.35; }
.player-head { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:8px 10px; }
.player-title { margin:0; font-size:.95rem; }
.player-tools { display:flex; align-items:center; gap:8px; }
.player-meta { color:var(--muted); font-size:.82rem; }
.player-ch { min-height:30px; padding:5px 10px; font-size:.72rem; font-weight:700; }
.player-wrap { position:relative; border-top:1px solid var(--border); overflow:visible; background:#000; aspect-ratio:16/9; min-height:360px; max-height:520px; }
.player-frame { width:calc(100% + 28px); margin-left:-14px; height:100%; border:0; background:#000; }
.grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px; display:grid; gap:6px; min-height:96px; cursor:pointer; }
.card.dragging { opacity:.5; border-style:dashed; }
.title-row { display:flex; align-items:center; gap:8px; }
.tv-logo { width:22px; height:22px; object-fit:contain; border-radius:3px; background:#0d1323; border:1px solid #2a365a; padding:2px; }
.tv-logo-fallback { width:22px; height:22px; border-radius:3px; border:1px solid #2a365a; display:grid; place-items:center; font-size:.55rem; color:#dce6ff; background:linear-gradient(180deg,#253667,#1a2444); font-weight:700; letter-spacing:.02em; text-transform:uppercase; }
.card.active { border-color:var(--accent); }
.card-header { display:flex; align-items:start; justify-content:space-between; gap:8px; }
.title { margin:0; font-size:.82rem; line-height:1.2; }
.badge { font-size:.62rem; color:#c7d3ff; background:#222c49; border:1px solid #3a4a7b; border-radius:999px; padding:1px 6px; white-space:nowrap; }
.desc { margin:0; font-size:.68rem; color:var(--muted); line-height:1.2; }
.actions { display:flex; gap:5px; margin-top:auto; }
.open { flex:1; background:linear-gradient(180deg,#5e79f5,#4a63cf); border-color:#4861ca; color:#f1f4ff; font-weight:600; font-size:.72rem; }
.fav { width:32px; height:32px; padding:0; }
.fav.active { color:var(--fav); border-color:var(--fav); }
.empty { color:var(--muted); text-align:center; padding:20px 0; }
@media (max-width:1400px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } }
@media (max-width:1160px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } .guide-list { max-height:280px; } .player-wrap { min-height:300px; max-height:400px; } }
@media (max-width:900px) { .controls { grid-template-columns:1fr; } .media-row { grid-template-columns:1fr; } .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } .wrap { padding-bottom:230px; } }
@media (max-width:680px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
@media (max-width:430px) { .grid { grid-template-columns:1fr; } .guide-list { max-height:180px; } .player-wrap { min-height:220px; max-height:280px; } .wrap { padding-bottom:20px; } }
</style></head>

function normalizeName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/&/g,' and ').replace(/\+/g,' plus ').replace(/0/g,'o').replace(/\bhd\b/g,' ').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();}
function saveState(){localStorage.setItem('iptv-favorites',JSON.stringify([...appState.favorites]));}
function orderedChannels(){if(!appState.order.length) return channels.slice(); const rank=new Map(appState.order.map((n,i)=>[n,i])); return channels.slice().sort((a,b)=>(rank.get(a.name)??9999)-(rank.get(b.name)??9999)||a.name.localeCompare(b.name));}
function saveOrder(){localStorage.setItem('iptv-order',JSON.stringify(appState.order));}
function moveChannelBefore(draggedName,targetName){const list=orderedChannels().map(c=>c.name);const from=list.indexOf(draggedName);const to=list.indexOf(targetName);if(from===-1||to===-1||from===to) return; const [item]=list.splice(from,1); list.splice(to,0,item); appState.order=list; saveOrder();}
function isFavorite(name){return appState.favorites.has(name)}
function toggleFavorite(name){appState.favorites.has(name)?appState.favorites.delete(name):appState.favorites.add(name); saveState(); render();}
function formatClock(date){return date.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit',hour12:false});}
function formatStamp(date){return date.toLocaleString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
function buildStreamUrl(url){const u=new URL(url); u.searchParams.set('autoplay','1'); u.searchParams.set('muted','1'); return u.toString();}
function focusPanel(panel){if(!panel) return; panel.classList.add('panel-focus'); setTimeout(()=>panel.classList.remove('panel-focus'),1200); panel.scrollIntoView({behavior:'smooth',block:'center'});}
function escapeHtml(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function getProgramsForChannel(name){return epgState.programsByChannel[name]||[];}
function updateGuideStatus(extra=''){const now=formatClock(new Date()); if(epgState.mode==='loading'){els.guideStatus.classList.remove('live'); els.guideStatus.textContent=`Se incarca programul... • ${now}`; return;} if(epgState.mode==='ready'&&epgState.updatedAt){els.guideStatus.classList.add('live'); const source=epgState.sourceUsed?` • sursa: ${epgState.sourceUsed}`:''; els.guideStatus.textContent=`Program actualizat (${formatStamp(epgState.updatedAt)})${source} • ${now}${extra?` • ${extra}`:''}`; return;} if(epgState.mode==='error'){els.guideStatus.classList.remove('live'); els.guideStatus.textContent=`Nu s-a putut incarca ghidul TV • ${now}${extra?` • ${extra}`:''}`; return;} els.guideStatus.classList.remove('live'); els.guideStatus.textContent=`Astept selectia unui canal • ${now}`;}
function updateGuide(channel,{scrollToNow=false}={}){if(!channel){els.playerMeta.textContent='Acum: - • Next: -'; els.guideList.innerHTML='<div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Selecteaza un canal</span></div>'; updateGuideStatus(); return;} const items=getProgramsForChannel(channel.name).slice().sort((a,b)=>new Date(a.start)-new Date(b.start)); if(!items.length){const mapped=epgState.matchedXmlNameByChannel[channel.name]; els.playerMeta.textContent='Acum: - • Next: -'; els.guideList.innerHTML=`<div class="guide-row"><span class="guide-time">N/A</span><span class="guide-show">Nu sunt date de program pentru acest post${mapped?` (mapat la ${escapeHtml(mapped)})`:''}.</span></div>`; updateGuideStatus(mapped?`mapat: ${mapped}`:''); return;} const now=new Date(); let currentShow=null,nextShow=null; const rows=items.map((item,idx)=>{const start=new Date(item.start); const stop=item.stop?new Date(item.stop):(items[idx+1]?new Date(items[idx+1].start):null); const isNow=start<=now && (!stop || now<stop); if(isNow){currentShow=item.title; nextShow=items[idx+1]?.title||null;} return `<div class="guide-row ${isNow?'now':''}"><span class="guide-time">${isNow?'Acum':formatClock(start)}</span><span class="guide-show">${escapeHtml(item.title)}${item.details?`<br><small style="color:#98a3c7;">${escapeHtml(item.details)}</small>`:''}</span></div>`;}); if(!currentShow){currentShow=items[0]?.title||'-'; nextShow=items[1]?.title||null;} els.playerMeta.textContent=`Acum: ${currentShow||'-'} • Next: ${nextShow||'-'}`; els.guideList.innerHTML=rows.join(''); const mapped=epgState.matchedXmlNameByChannel[channel.name]; updateGuideStatus(mapped?`mapat: ${mapped}`:''); if(scrollToNow){const currentRow=els.guideList.querySelector('.guide-row.now'); els.guideList.scrollTop=currentRow?Math.max(0,currentRow.offsetTop-8):0;}}
function openStream(channel,{autoLaunch=false,focus=true}={}){appState.playing=channel.name; epgState.lastChannel=channel; els.playerTitle.textContent=channel.name; const directUrl=buildStreamUrl(channel.embed); if(els.playerFrame.src!==directUrl) els.playerFrame.src=directUrl; if(autoLaunch){const opened=window.open(directUrl,'_blank','noopener'); if(!opened) els.playerMeta.textContent=`${channel.category} • popup blocat`; } if(focus) focusPanel(els.playerPanel); updateGuide(channel,{scrollToNow:true}); render();}
function filteredChannels(){const q=appState.search.toLowerCase(); return orderedChannels().filter(c=>appState.category==='all'||c.category===appState.category).filter(c=>c.name.toLowerCase().includes(q)||c.description.toLowerCase().includes(q)).filter(c=>!appState.favoritesOnly||isFavorite(c.name));}
function navigateFavorite(step){const favorites=orderedChannels().filter(c=>isFavorite(c.name)); if(!favorites.length){els.playerMeta.textContent='Nu ai canale favorite. Marcheaza canale cu ★.'; return;} const currentIndex=favorites.findIndex(c=>c.name===appState.playing); const nextIndex=currentIndex===-1?0:(currentIndex+step+favorites.length)%favorites.length; openStream(favorites[nextIndex]);}
function isPlayerFullscreen(){return document.fullscreenElement===els.playerFrame||document.webkitFullscreenElement===els.playerFrame;}
async function togglePlayerFullscreen(){try{if(!isPlayerFullscreen()){await (els.playerFrame.requestFullscreen?.()||els.playerFrame.webkitRequestFullscreen?.());} else {await (document.exitFullscreen?.()||document.webkitExitFullscreen?.());}}catch(err){console.warn('Fullscreen indisponibil',err);}}
function initialsForChannel(name){const cleaned=String(name||'').replace(/\b(HD|TV)\b/gi,'').replace(/[^A-Za-z0-9 ]+/g,' ').trim(); const parts=cleaned.split(/\s+/).filter(Boolean); if(!parts.length) return 'TV'; return parts.slice(0,2).map(p=>p[0]).join('').toUpperCase();}
function getLogoHtml(name){const logoUrl=channelLogos[name]; const initials=initialsForChannel(name); if(!logoUrl) return `<span class="tv-logo-fallback" aria-hidden="true">${initials}</span>`; return `<img class="tv-logo" src="${logoUrl}" alt="${name} logo" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'tv-logo-fallback',textContent:'${initials}','ariaHidden':'true'}));" />`;}
function render(){const list=filteredChannels(); els.grid.innerHTML=''; if(!list.length){els.grid.innerHTML='<div class="empty">Nu exista canale pentru filtrul selectat.</div>'; return;} for(const c of list){const card=document.createElement('article'); card.className=`card ${appState.playing===c.name?'active':''}`; card.draggable=true; card.dataset.channel=c.name; const logoHtml=getLogoHtml(c.name); const hasGuide=!!getProgramsForChannel(c.name).length; const mapped=epgState.matchedXmlNameByChannel[c.name]; card.innerHTML=`<div class="card-header"><div class="title-row">${logoHtml}<h3 class="title">${c.name}</h3></div><span class="badge">${c.category}</span></div><p class="desc">${c.description}</p><p class="desc" style="margin-top:-2px;">${hasGuide?'Program disponibil':(mapped?`Mapat: ${escapeHtml(mapped)}`:'Fara EPG')}</p><div class="actions"><button class="open" type="button">▶ Open stream</button><button class="fav ${isFavorite(c.name)?'active':''}" type="button" title="Favorite">★</button></div>`; card.querySelector('.open').addEventListener('click',e=>{e.stopPropagation(); openStream(c);}); card.addEventListener('click',()=>openStream(c)); card.querySelector('.fav').addEventListener('click',e=>{e.stopPropagation(); toggleFavorite(c.name);}); card.addEventListener('dragstart',e=>{card.classList.add('dragging'); e.dataTransfer?.setData('text/plain',c.name); e.dataTransfer.effectAllowed='move';}); card.addEventListener('dragend',()=>card.classList.remove('dragging')); card.addEventListener('dragover',e=>{e.preventDefault(); e.dataTransfer.dropEffect='move';}); card.addEventListener('drop',e=>{e.preventDefault(); const dragged=e.dataTransfer?.getData('text/plain'); if(!dragged||dragged===c.name) return; moveChannelBefore(dragged,c.name); render();}); els.grid.append(card);} els.showFav.classList.toggle('active',appState.favoritesOnly);}
function initCategories(){const seen=new Set([...els.category.options].map(o=>o.value)); const cats=[...new Set(channels.map(c=>c.category))].sort(); for(const cat of cats){ if(seen.has(cat)) continue; const opt=document.createElement('option'); opt.value=cat; opt.textContent=cat; els.category.append(opt); }}
function loadCache(){try{const raw=localStorage.getItem(EPG_CACHE_KEY); if(!raw) return null; const parsed=JSON.parse(raw); if(!parsed||typeof parsed!=='object'||!parsed.fetchedAt||!parsed.programsByChannel) return null; return parsed;}catch{return null;}}
function saveCache(){try{localStorage.setItem(EPG_CACHE_KEY,JSON.stringify({fetchedAt:Date.now(),updatedAt:epgState.updatedAt?epgState.updatedAt.toISOString():null,sourceUsed:epgState.sourceUsed,programsByChannel:epgState.programsByChannel,matchedXmlNameByChannel:epgState.matchedXmlNameByChannel}));}catch{}}
function applyCache(cache){epgState.programsByChannel=cache.programsByChannel||{}; epgState.matchedXmlNameByChannel=cache.matchedXmlNameByChannel||{}; epgState.updatedAt=cache.updatedAt?new Date(cache.updatedAt):null; epgState.sourceUsed=cache.sourceUsed||null; epgState.mode='ready';}
async function fetchUrl(url, asBuffer=false){let lastError=null; for(const prefix of CORS_PREFIXES){const full=prefix?`${prefix}${encodeURIComponent(url)}`:url; try{const res=await fetch(full,{cache:'no-store'}); if(!res.ok) throw new Error(`HTTP ${res.status}`); return asBuffer?await res.arrayBuffer():await res.text();}catch(e){lastError=e;}} throw lastError||new Error('fetch failed');}
async function arrayBufferToText(buffer, compressed){ if(compressed){try{if('DecompressionStream' in window){const ds=new DecompressionStream('gzip'); const stream=new Response(buffer).body.pipeThrough(ds); return await new Response(stream).text(); }}catch(e){} }
 try{ return new TextDecoder('utf-8').decode(buffer);}catch(e){return '';}}
function parseXmltvDate(value){const text=String(value||'').trim(); const m=text.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s*([+\-]\d{4})?$/); if(!m) return null; const [,y,mo,d,h,mi,s,tz]=m; const iso=`${y}-${mo}-${d}T${h}:${mi}:${s}${tz?`${tz.slice(0,3)}:${tz.slice(3)}`:'Z'}`; const date=new Date(iso); return Number.isNaN(date.getTime())?null:date;}
function displayNamesForChannel(localName){const norm=normalizeName(localName); const list=[norm, `${norm}.ro`]; if(aliasMap[norm]) list.push(...aliasMap[norm].map(normalizeName)); return [...new Set(list.filter(Boolean))];}
function scoreName(localName, xmlName){const localCandidates=displayNamesForChannel(localName); const xmlNorm=normalizeName(xmlName); if(localCandidates.includes(xmlNorm)) return 100; let best=0; for(const c of localCandidates){ if(!c) continue; if(xmlNorm.includes(c)||c.includes(xmlNorm)) best=Math.max(best,85); const lt=new Set(c.split(' ')); const xt=new Set(xmlNorm.split(' ')); let overlap=0; for(const t of lt){if(xt.has(t)) overlap++;} best=Math.max(best, Math.round((overlap/Math.max(lt.size,xt.size))*70)); } return best;}
function buildProgramsFromXml(doc){const xmlChannels=[...doc.querySelectorAll('channel')].map(ch=>({id:ch.getAttribute('id')||'', names:[...ch.querySelectorAll('display-name')].map(n=>n.textContent?.trim()).filter(Boolean)})).filter(ch=>ch.id&&ch.names.length);
const matchedByLocal={}; const matchedIdByLocal={}; for(const local of channels){let bestScore=0, best=null; for(const xml of xmlChannels){for(const name of xml.names){const score=scoreName(local.name,name); if(score>bestScore){bestScore=score; best={id:xml.id,name};}}} if(best&&bestScore>=68){matchedByLocal[local.name]=best.name; matchedIdByLocal[local.name]=best.id;}}
const programmes=[...doc.querySelectorAll('programme')]; const byId={}; const now=Date.now(); const minTs=now-12*60*60*1000; const maxTs=now+72*60*60*1000; for(const p of programmes){const id=p.getAttribute('channel')||''; if(!id) continue; const start=parseXmltvDate(p.getAttribute('start')); if(!start) continue; const stop=parseXmltvDate(p.getAttribute('stop')); const st=start.getTime(); const sp=stop?stop.getTime():st+60*60*1000; if(sp<minTs||st>maxTs) continue; const title=p.querySelector('title')?.textContent?.trim(); if(!title) continue; const desc=p.querySelector('desc')?.textContent?.trim()||''; const cat=p.querySelector('category')?.textContent?.trim()||''; (byId[id]||(byId[id]=[])).push({start:start.toISOString(), stop:stop?stop.toISOString():null, title, details:[cat,desc].filter(Boolean).join(' • ').slice(0,180)}); }
const programsByChannel={}; let total=0; for(const local of channels){const id=matchedIdByLocal[local.name]; const items=(byId[id]||[]).sort((a,b)=>new Date(a.start)-new Date(b.start)); programsByChannel[local.name]=items; total+=items.length; }
return {programsByChannel, matchedByLocal, total};}
async function fetchAndParseSource(source){let xmlText=''; const isGz=source.endsWith('.gz'); if(isGz){const buf=await fetchUrl(source,true); xmlText=await arrayBufferToText(buf,true);} else {xmlText=await fetchUrl(source,false);} if(!xmlText||!xmlText.includes('<tv')) throw new Error('XML invalid'); const doc=new DOMParser().parseFromString(xmlText,'text/xml'); if(doc.querySelector('parsererror')) throw new Error('parsererror'); return buildProgramsFromXml(doc);}
async function refreshEpg({background=false}={}){if(epgState.refreshInFlight) return false; epgState.refreshInFlight=true; if(!background){epgState.mode='loading'; updateGuideStatus();} let best=null, lastError=null; try{for(const source of EPG_SOURCES){try{const parsed=await fetchAndParseSource(source); if(!best||parsed.total>best.total){best={...parsed, source};} if(parsed.total>50) break; }catch(e){lastError=e;}}
 if(!best||!best.total) throw lastError||new Error('Nu s-au gasit programe'); epgState.programsByChannel=best.programsByChannel; epgState.matchedXmlNameByChannel=best.matchedByLocal; epgState.updatedAt=new Date(); epgState.sourceUsed=best.source.replace(/^https?:\/\//,''); epgState.mode='ready'; saveCache(); render(); if(epgState.lastChannel) updateGuide(epgState.lastChannel,{scrollToNow:true}); else updateGuideStatus(); return true; }catch(error){console.error('EPG refresh failed',error); if(!epgState.updatedAt){epgState.mode='error'; updateGuideStatus(String(error&&error.message||'eroare'));} return false; } finally{epgState.refreshInFlight=false;}}
async function initializeEpg(){const cache=loadCache(); if(cache){applyCache(cache); render(); if(epgState.lastChannel) updateGuide(epgState.lastChannel); else updateGuideStatus(); if(Date.now()-cache.fetchedAt>EPG_CACHE_MAX_AGE_MS) refreshEpg({background:true});} else {epgState.mode='loading'; updateGuideStatus(); await refreshEpg();}}
els.search.addEventListener('input',e=>{appState.search=e.target.value.trim(); render();}); els.category.addEventListener('change',e=>{appState.category=e.target.value; render();}); els.showFav.addEventListener('click',()=>{appState.favoritesOnly=!appState.favoritesOnly; render();}); els.goToProgram.addEventListener('click',()=>focusPanel(els.tvGuide)); els.playerFullscreenBtn.addEventListener('click',togglePlayerFullscreen); els.prevFavBtn.addEventListener('click',()=>navigateFavorite(-1)); els.nextFavBtn.addEventListener('click',()=>navigateFavorite(1)); els.playerWrap.addEventListener('dblclick',togglePlayerFullscreen); els.playerFrame.addEventListener('dblclick',togglePlayerFullscreen);
document.getElementById('appVersion').textContent=`v${APP_VERSION}`; initCategories(); render(); initializeEpg().then(()=>{const startup=channels[0]; if(startup) openStream(startup,{focus:false}); else updateGuide(null);}); setInterval(()=>{if(epgState.lastChannel) updateGuide(epgState.lastChannel); else updateGuideStatus();},60000); setInterval(()=>refreshEpg({background:true}),EPG_BACKGROUND_REFRESH_MS);
</script></body></html>
