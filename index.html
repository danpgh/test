<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV TV Mode</title>

<style>
:root {
  --bg:#090b12;
  --panel:#111522;
  --border:#27304a;
  --text:#ebefff;
  --muted:#98a3c7;
  --accent:#6f8cff;
}

body {
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap { padding:10px; }

.player {
  background:#000;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.player iframe {
  width:100%;
  height:400px;
  border:0;
}

/* ===== TV MODE ===== */

.player-title {
  font-size:1.4rem;
  padding:10px;
}

.player-meta {
  font-size:1.2rem;
  padding:0 10px 10px;
}

.tv-guide {
  background:#111522;
  padding:10px;
  border-radius:10px;
}

.guide-title {
  font-size:2rem;
  margin-bottom:10px;
}

.guide-row {
  display:grid;
  grid-template-columns:100px 1fr;
  gap:10px;
  font-size:1.6rem;
  margin-bottom:12px;
}

.guide-time {
  color:#9db0eb;
}

.guide-show {
  color:#fff;
}

.now .guide-time { color:#8df0be; }
.now .guide-show { font-weight:bold; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}

.card {
  background:#111522;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.card:hover {
  border:1px solid var(--accent);
}
</style>
</head>

<body>

<div class="wrap">

  <div class="player">
    <div class="player-title" id="title">Selecteaza canal</div>
    <div class="player-meta" id="meta">Program...</div>
    <iframe id="frame"></iframe>
  </div>

  <div class="tv-guide">
    <div class="guide-title">Program TV</div>
    <div id="guide"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const channels = [
  {name:"PROTV HD", url:"https://canale-tv.com/channel/pr0tv.html"},
  {name:"A1 HD", url:"https://canale-tv.com/channel/a1.html"},
  {name:"TVR1", url:"https://canale-tv.com/channel/tvr1.html"},
  {name:"Digi24", url:"https://canale-tv.com/channel/digi24.html"}
];

const epg = {
  "PROTV HD":[
    {time:"14:00",title:"Film actiune"},
    {time:"16:00",title:"Stiri"}
  ],
  "A1 HD":[
    {time:"14:00",title:"Show"},
    {time:"15:30",title:"Serial"}
  ]
};

const grid = document.getElementById("grid");
const frame = document.getElementById("frame");
const title = document.getElementById("title");
const meta = document.getElementById("meta");
const guide = document.getElementById("guide");

function openChannel(c){
  frame.src = c.url;
  title.textContent = c.name;

  const list = epg[c.name] || [];
  guide.innerHTML = "";

  list.forEach((p,i)=>{
    const row = document.createElement("div");
    row.className="guide-row"+(i==0?" now":"");
    row.innerHTML = `<div class="guide-time">${p.time}</div><div class="guide-show">${p.title}</div>`;
    guide.appendChild(row);
  });

  meta.textContent = list[0]?.title || "-";
}

channels.forEach(c=>{
  const el = document.createElement("div");
  el.className="card";
  el.textContent = c.name;
  el.onclick=()=>openChannel(c);
  grid.appendChild(el);
});
</script>

</body>
</html>
