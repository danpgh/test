<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width:1600px; margin:0 auto; padding:14px 14px 28px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    .hint { margin:0; color:var(--muted); font-size:.9rem; }
    .top { display:grid; gap:10px; margin-bottom:12px; }
    .controls { display:grid; grid-template-columns:auto 1fr 220px auto; gap:8px; }
    input,select { width:100%; border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px 12px; outline:none; }
    button { border:1px solid var(--border); border-radius:0 !important; background:#131a2d; color:var(--text); padding:7px 9px; font-size:.82rem; cursor:pointer; min-height:38px; }
    button.active { border-color:var(--accent); color:#dce4ff; }
    .panel-focus { box-shadow:0 0 0 2px rgba(111,140,255,.75), 0 14px 30px rgba(0,0,0,.45); transition: box-shadow .25s ease; }
    .media-row { display:grid; grid-template-columns:minmax(520px, 1.55fr) minmax(320px, 0.95fr); gap:10px; align-items:start; margin-bottom:12px; }
    .player { width:100%; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; overflow:visible; box-shadow:0 14px 30px rgba(0,0,0,.45); position:relative; z-index:2; }
    .tv-guide { width:100%; z-index:1; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; padding:8px; box-shadow:0 12px 22px rgba(0,0,0,.35); }
    .guide-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
    .guide-title { margin:0; font-size:1.9rem; color:#c9d3f7; font-weight:700; }
    .guide-badge { font-size:1.05rem; border:1px solid #3a4a7b; background:#1a2444; color:#ccdaff; border-radius:999px; padding:4px 10px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .guide-badge.live { border-color:#2f8762; background:#123527; color:#8df0be; }
    .guide-list { max-height:360px; overflow-y:auto; padding-right:4px; }
    .guide-row { display:grid; grid-template-columns:110px 1fr; gap:12px; font-size:1.32rem; margin-bottom:14px; }
    .guide-row.now .guide-time { color:#8df0be; font-weight:700; }
    .guide-row.now .guide-show { color:#f2fff8; }
    .guide-time { color:#9db0eb; font-size:1.18rem; font-weight:600; }
    .guide-show { color:#e1e8ff; line-height:1.4; font-size:1.32rem; }
    .player-head { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:8px 10px; }
    .player-title { margin:0; font-size:1.2rem; }
    .player-tools { display:flex; align-items:center; gap:8px; }
    .player-meta { color:var(--muted); font-size:1.15rem; font-weight:500; }
    .player-ch { min-height:30px; padding:5px 10px; font-size:.72rem; font-weight:700; }
    .player-wrap { position:relative; border-top:1px solid var(--border); overflow:visible; background:#000; aspect-ratio:16/9; min-height:270px; max-height:390px; }
    .player-frame { width:calc(100% + 28px); margin-left:-14px; height:100%; border:0; background:#000; }
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px; display:grid; gap:6px; min-height:96px; cursor:pointer; }
    .card.dragging { opacity:.5; border-style:dashed; }
    .title-row { display:flex; align-items:center; gap:8px; }
    .tv-logo { width:22px; height:22px; object-fit:contain; border-radius:3px; background:#0d1323; border:1px solid #2a365a; padding:2px; }
    .tv-logo-fallback { width:22px; height:22px; border-radius:3px; border:1px solid #2a365a; display:grid; place-items:center; font-size:.55rem; color:#dce6ff; background:linear-gradient(180deg,#253667,#1a2444); font-weight:700; letter-spacing:.02em; text-transform:uppercase; }
    .card.active { border-color:var(--accent); }
    .card-header { display:flex; align-items:start; justify-content:space-between; gap:8px; }
    .title { margin:0; font-size:.82rem; line-height:1.2; }
    .badge { font-size:.62rem; color:#c7d3ff; background:#222c49; border:1px solid #3a4a7b; border-radius:999px; padding:1px 6px; white-space:nowrap; }
    .desc { margin:0; font-size:.68rem; color:var(--muted); line-height:1.2; }
    .actions { display:flex; gap:5px; margin-top:auto; }
    .open { flex:1; background:linear-gradient(180deg,#5e79f5,#4a63cf); border-color:#4861ca; color:#f1f4ff; font-weight:600; font-size:.72rem; }
    .fav { width:32px; height:32px; padding:0; }
    .fav.active { color:var(--fav); border-color:var(--fav); }
    .empty { color:var(--muted); text-align:center; padding:20px 0; }
    @media (max-width:1400px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } }
    @media (max-width:1160px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } .guide-list { max-height:320px; } . { min-height:300px; max-height:400px; } .guide-row { grid-template-columns:96px 1fr; font-size:1.18rem; } .guide-show { font-size:1.18rem; } .player-meta { font-size:1rem; } }
    @media (max-width:900px) { .controls { grid-template-columns:1fr; } .media-row { grid-template-columns:1fr; } .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } .wrap { padding-bottom:230px; } }
    @media (max-width:680px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:430px) { .grid { grid-template-columns:1fr; } .guide-list { max-height:220px; } .player-wrap { min-height:220px; max-height:280px; } .wrap { padding-bottom:20px; } .guide-row { grid-template-columns:82px 1fr; font-size:1.02rem; gap:8px; } .guide-show { font-size:1.02rem; } .guide-time { font-size:.95rem; } .player-meta { font-size:.96rem; } }
  </style>
</head>

    <div class="media-row">

          <div class="player-tools">

            <button id="prevFavBtn" class="player-ch" type="button">CH-</button>
            <button id="nextFavBtn" class="player-ch" type="button">CH+</button>
            <button id="playerFullscreenBtn" class="player-ch" type="button">⛶ Full</button>
          </div>
        </div>
        <div class="player-wrap">
          <iframe id="playerFrame" class="player-frame" title="IPTV Preview" allow="autoplay *; fullscreen *" allowfullscreen webkitallowfullscreen mozallowfullscreen loading="eager" src="about:blank"></iframe>
        </div>
      </section>

      <section class="tv-guide" id="tvGuide">
        <div class="guide-head">
          <h3 class="guide-title">Program TV</h3>
          <span class="guide-badge" id="guideStatus">Se incarca ghidul local...</span>
        </div>
        <div class="guide-list" id="guideList"><div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Se incarca programul...</span></div></div>
      </section>
    </div>

    <section class="grid" id="channelGrid"></section>
    <p class="hint"><span id="appVersion"></span></p>
  </div>

      playerFrame: document.getElementById('playerFrame'),
      playerFullscreenBtn: document.getElementById('playerFullscreenBtn'),
      prevFavBtn: document.getElementById('prevFavBtn'),
      nextFavBtn: document.getElementById('nextFavBtn'),
      playerTitle: document.getElementById('playerTitle'),
      playerMeta: document.getElementById('playerMeta'),
      guideList: document.getElementById('guideList'),
      guideStatus: document.getElementById('guideStatus'),
      playerPanel: document.getElementById('playerPanel'),
      tvGuide: document.getElementById('tvGuide'),
      playerWrap: document.querySelector('.player-wrap')
    };

    const epgState = {
      programsByChannel: {},
      updatedAt: null,
      generatedAt: null,
      unresolvedChannels: []
    };

    function saveState() { localStorage.setItem('iptv-favorites', JSON.stringify([...appState.favorites])); }
    function saveOrder() { localStorage.setItem('iptv-order', JSON.stringify(appState.order)); }

    function orderedChannels() {
      if (!appState.order.length) return channels.slice();
      const rank = new Map(appState.order.map((name, idx) => [name, idx]));
      return channels.slice().sort((a, b) => (rank.get(a.name) ?? 9999) - (rank.get(b.name) ?? 9999) || a.name.localeCompare(b.name));
    }

    function moveChannelBefore(draggedName, targetName) {
      const list = orderedChannels().map(c => c.name);
      const from = list.indexOf(draggedName);
      const to = list.indexOf(targetName);
      if (from === -1 || to === -1 || from === to) return;
      const [item] = list.splice(from, 1);
      list.splice(to, 0, item);
      appState.order = list;
      saveOrder();
    }

    function isFavorite(name) { return appState.favorites.has(name); }
    function toggleFavorite(name) {
      appState.favorites.has(name) ? appState.favorites.delete(name) : appState.favorites.add(name);
      saveState();
      render();
    }

    function buildStreamUrl(url) {
      const u = new URL(url);
      u.searchParams.set('autoplay', '1');
      u.searchParams.set('muted', '1');
      return u.toString();
    }

    function formatClock(date) {
      return date.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatStamp(dateLike) {
      if (!dateLike) return '-';
      const date = new Date(dateLike);
      if (Number.isNaN(date.getTime())) return String(dateLike);
      return date.toLocaleString('ro-RO', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
    }

    function focusPanel(panel) {
      if (!panel) return;
      panel.classList.add('panel-focus');
      setTimeout(() => panel.classList.remove('panel-focus'), 1200);
      panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateGuideStatus() {
      const now = formatClock(new Date());
      if (epgState.generatedAt) {
        els.guideStatus.classList.add('live');
        els.guideStatus.textContent = `Program local actualizat (${formatStamp(epgState.generatedAt)}) • ${now}`;
      } else {
        els.guideStatus.classList.remove('live');
        els.guideStatus.textContent = `Nu exista epg.json valid • ${now}`;
      }
    }

    function updateGuide(channel, { scrollToNow = false } = {}) {
      if (!channel) {
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Selecteaza un canal</span></div>';
        updateGuideStatus();
        return;
      }
      const items = (epgState.programsByChannel[channel.name] || []).slice().sort((a, b) => new Date(a.start) - new Date(b.start));
      if (!items.length) {
        els.playerMeta.textContent = 'Acum: - • Next: -';
        els.guideList.innerHTML = '<div class="guide-row"><span class="guide-time">N/A</span><span class="guide-show">Nu sunt date de program pentru acest post.</span></div>';
        updateGuideStatus();
        return;
      }
      const now = new Date();
      let currentShow = null;
      let nextShow = null;
      const rows = items.map((item, idx) => {
        const start = new Date(item.start);
        const next = items[idx + 1] ? new Date(items[idx + 1].start) : (item.stop ? new Date(item.stop) : null);
        const isNow = start <= now && (!next || now < next);
        if (isNow) {
          currentShow = item.title;
          nextShow = items[idx + 1]?.title || null;
        }
        const label = isNow ? 'Acum' : formatClock(start);
        return `<div class="guide-row ${isNow ? 'now' : ''}"><span class="guide-time">${label}</span><span class="guide-show">${escapeHtml(item.title)}${item.details ? `<br><small style="color:#98a3c7;">${escapeHtml(item.details)}</small>` : ''}</span></div>`;
      });
      if (!currentShow) {
        currentShow = items[0]?.title || '-';
        nextShow = items[1]?.title || null;
      }
      els.playerMeta.textContent = `Acum: ${currentShow || '-'} • Next: ${nextShow || '-'}`;
      els.guideList.innerHTML = rows.join('');
      updateGuideStatus();
      if (scrollToNow) {
        const currentRow = els.guideList.querySelector('.guide-row.now');
        els.guideList.scrollTop = currentRow ? Math.max(0, currentRow.offsetTop - 8) : 0;
      }
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function openStream(channel, { autoLaunch = false, focus = true } = {}) {
      appState.playing = channel.name;
      els.playerTitle.textContent = channel.name;
      const directUrl = buildStreamUrl(channel.embed);
      if (els.playerFrame.src !== directUrl) els.playerFrame.src = directUrl;
      if (autoLaunch) {
        const opened = window.open(directUrl, '_blank', 'noopener');
        if (!opened) els.playerMeta.textContent = `${channel.category} • popup blocat`;
      }
      if (focus) focusPanel(els.playerPanel);
      updateGuide(channel, { scrollToNow: true });
      render();
    }

    function filteredChannels() {
      const q = appState.search.toLowerCase();
      return orderedChannels()
        .filter(c => appState.category === 'all' || c.category === appState.category)
        .filter(c => c.name.toLowerCase().includes(q) || c.description.toLowerCase().includes(q))
        .filter(c => !appState.favoritesOnly || isFavorite(c.name));
    }

    function navigateFavorite(step) {
      const favorites = orderedChannels().filter((c) => isFavorite(c.name));
      if (!favorites.length) {
        els.playerMeta.textContent = 'Nu ai canale favorite. Marcheaza canale cu ★.';
        return;
      }
      const currentIndex = favorites.findIndex((c) => c.name === appState.playing);
      const nextIndex = currentIndex === -1 ? 0 : (currentIndex + step + favorites.length) % favorites.length;
      openStream(favorites[nextIndex]);
    }

    function isPlayerFullscreen() {
      return document.fullscreenElement === els.playerFrame || document.webkitFullscreenElement === els.playerFrame;
    }

    async function togglePlayerFullscreen() {
      try {
        if (!isPlayerFullscreen()) {
          await (els.playerFrame.requestFullscreen?.() || els.playerFrame.webkitRequestFullscreen?.());
        } else {
          await (document.exitFullscreen?.() || document.webkitExitFullscreen?.());
        }
      } catch (err) {
        console.warn('Fullscreen indisponibil', err);
      }
    }

    function initialsForChannel(name) {
      const cleaned = String(name || '').replace(/\b(HD|TV)\b/gi, '').replace(/[^A-Za-z0-9 ]+/g, ' ').trim();
      const parts = cleaned.split(/\s+/).filter(Boolean);
      if (!parts.length) return 'TV';
      return parts.slice(0, 2).map((part) => part[0]).join('').toUpperCase();
    }

    function getLogoHtml(channelName) {
      const logoUrl = channelLogos[channelName];
      const initials = initialsForChannel(channelName);
      if (!logoUrl) return `<span class="tv-logo-fallback" aria-hidden="true">${initials}</span>`;
      return `<img class="tv-logo" src="${logoUrl}" alt="${channelName} logo" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'tv-logo-fallback',textContent:'${initials}','ariaHidden':'true'}));" />`;
    }

    function render() {
      const list = filteredChannels();
      els.grid.innerHTML = '';
      if (!list.length) {
        els.grid.innerHTML = '<div class="empty">Nu exista canale pentru filtrul selectat.</div>';
        return;
      }
      for (const c of list) {
        const card = document.createElement('article');
        card.className = `card ${appState.playing === c.name ? 'active' : ''}`;
        card.draggable = true;
        card.dataset.channel = c.name;
        const logoHtml = getLogoHtml(c.name);
        const hasGuide = !!(epgState.programsByChannel[c.name] || []).length;
        card.innerHTML = `
          <div class="card-header"><div class="title-row">${logoHtml}<h3 class="title">${c.name}</h3></div><span class="badge">${c.category}</span></div>
          <p class="desc">${c.description}</p>
          <p class="desc" style="margin-top:-2px;">${hasGuide ? 'Program disponibil' : 'Fara EPG'}</p>
          <div class="actions">
            <button class="open" type="button">▶ Open stream</button>
            <button class="fav ${isFavorite(c.name) ? 'active' : ''}" type="button" title="Favorite">★</button>
          </div>
        `;
        card.querySelector('.open').addEventListener('click', (e) => { e.stopPropagation(); openStream(c); });
        card.addEventListener('click', () => openStream(c));
        card.querySelector('.fav').addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(c.name); });
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer?.setData('text/plain', c.name);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const dragged = e.dataTransfer?.getData('text/plain');
          if (!dragged || dragged === c.name) return;
          moveChannelBefore(dragged, c.name);
          render();
        });
        els.grid.append(card);
      }
      els.showFav.classList.toggle('active', appState.favoritesOnly);
    }

    function initCategories() {
      const categories = [...new Set(channels.map(c => c.category))].sort();
      for (const cat of categories) {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        els.category.append(opt);
      }
    }

    async function loadLocalEpg() {
      const response = await fetch(`./epg.json?v=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`epg.json HTTP ${response.status}`);
      const payload = await response.json();
      epgState.programsByChannel = payload.channels || {};
      epgState.generatedAt = payload.generatedAt || null;
      epgState.updatedAt = payload.generatedAt || null;
      epgState.unresolvedChannels = payload.unresolved || [];
      updateGuideStatus();
      render();
      return true;
    }

    els.search.addEventListener('input', (e) => { appState.search = e.target.value.trim(); render(); });
    els.category.addEventListener('change', (e) => { appState.category = e.target.value; render(); });
    els.showFav.addEventListener('click', () => { appState.favoritesOnly = !appState.favoritesOnly; render(); });
    els.goToProgram.addEventListener('click', () => focusPanel(els.tvGuide));
    els.playerFullscreenBtn.addEventListener('click', togglePlayerFullscreen);
    els.prevFavBtn.addEventListener('click', () => navigateFavorite(-1));
    els.nextFavBtn.addEventListener('click', () => navigateFavorite(1));
    els.playerWrap.addEventListener('dblclick', togglePlayerFullscreen);
    els.playerFrame.addEventListener('dblclick', togglePlayerFullscreen);

    document.getElementById('appVersion').textContent = `v${APP_VERSION}`;
    initCategories();
    render();

    loadLocalEpg().catch((error) => {
      console.error(error);
      updateGuideStatus();
    }).finally(() => {
      const startupChannel = channels[0];
      if (startupChannel) openStream(startupChannel, { focus: false });
      else updateGuide(null);
    });

    setInterval(() => {
      if (appState.playing) {
        const current = channels.find(c => c.name === appState.playing);
        updateGuide(current);
      } else {
        updateGuideStatus();
      }
    }, 60000);
  </script>
</body>
</html>
