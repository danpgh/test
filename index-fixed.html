<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout fixed</title>
  <script>
    fetch('index.html', { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        // UI rename
        html = html.replace("name:'TV 1000'","name:'KINO TV'");
        html = html.replace("International movie catalog channel.","Kino TV (fost TV 1000). ");

        // remove Program button
        html = html.replace('<button id="goToProgram" type="button">📺 Program</button>', '');

        // remove Full button
        html = html.replace('<button id="playerFullscreenBtn" class="player-ch" type="button">⛶ Full</button>', '');

        const css = `
    .media-row { max-width:1240px;margin:auto;padding:10px;grid-template-columns:minmax(300px,3fr) minmax(260px,2fr);align-items:start;background:#101624;border:1px solid var(--border);border-radius:14px; }
    .player{overflow:hidden;box-shadow:none;} .player-wrap{overflow:hidden;aspect-ratio:16/9;} .player-frame{width:100%;margin:0;height:100%;}
    .tv-guide{box-shadow:none;height:490px;display:flex;flex-direction:column;} .guide-list{flex:1;overflow-y:auto;}
    .guide-row{font-size:1.1em!important;} .guide-time{font-size:1em!important;text-align:center;} .guide-show{font-size:1.1em!important;}
    .guide-title{font-size:0.7rem!important;} .guide-badge{font-size:0.5rem!important;}
`;
        html = html.replace('</style>', css + '</style>');
        document.open(); document.write(html); document.close();

        // 🔥 FAVORITES persistence REAL (click-based)
        function fixFavorites(){
          const btn = document.getElementById('showFavorites');
          if (!btn) return;

          const saved = localStorage.getItem('iptv-favorites-only');
          if (saved === '1' && !btn.classList.contains('active')) {
            btn.click();
          }

          if (!btn._hooked) {
            btn._hooked = true;
            btn.addEventListener('click', () => {
              setTimeout(() => {
                const active = btn.classList.contains('active');
                localStorage.setItem('iptv-favorites-only', active ? '1' : '0');
              }, 50);
            });
          }
        }

        setInterval(fixFavorites,500);
        setTimeout(fixFavorites,1000);
        setTimeout(fixFavorites,2000);

        // existing EPG mapping
        function mapEPG(){
          if (window.epgState && epgState.programsByChannel) {
            if (epgState.programsByChannel['TV 1000']) {
              epgState.programsByChannel['KINO TV'] = epgState.programsByChannel['TV 1000'];
            }
          }
        }
        setInterval(mapEPG,1000);
        setTimeout(mapEPG,1500);
        setTimeout(mapEPG,3000);

        function place(){
          var g=document.getElementById('guideList');
          if(!g)return;
          var n=g.querySelector('.guide-row.now');
          if(!n){
            var rows=g.querySelectorAll('.guide-row');
            for(var i=0;i<rows.length;i++){
              var tm=rows[i].querySelector('.guide-time');
              if(tm && tm.textContent.trim().toLowerCase()==='acum'){n=rows[i];break;}
            }
          }
          if(!n) return;
          var A=g.getBoundingClientRect();
          var B=n.getBoundingClientRect();
          g.scrollTop += (B.top - A.top) - 5;
        }

        setInterval(place,1000);
        setTimeout(place,500);
        setTimeout(place,1500);
        setTimeout(place,3000);

      });
  </script>
</head>
<body></body>
</html>
