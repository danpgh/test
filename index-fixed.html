<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - fixed</title>
  <script>
    fetch('index.html', { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        html = html.replace(
          '</style>',
          `
    /* Fix: cadrul playerului sta exact in jurul playerului */
    .media-row {
      grid-template-columns: minmax(390px, 1.35fr) minmax(320px, 1fr);
      align-items: stretch;
    }

    .player {
      overflow: hidden;
    }

    .player-wrap {
      overflow: hidden;
      aspect-ratio: 16 / 9;
      min-height: auto;
      max-height: none;
    }

    .player-frame {
      width: 100%;
      margin-left: 0;
      height: 100%;
      display: block;
    }

    /* Fix: cadrul programului ajustat in consecinta */
    .tv-guide {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .guide-list {
      flex: 1;
      max-height: none;
    }

    /* Fix: "Acum" centrat in coloana din dreapta */
    .guide-time {
      text-align: center;
    }

    @media (max-width:1160px) {
      .player-wrap { min-height: auto; max-height: none; }
    }

    @media (max-width:430px) {
      .player-wrap { min-height: auto; max-height: none; }
    }
  </style>`
        );
        document.open();
        document.write(html);
        document.close();
      });
  </script>
</head>
<body></body>
</html>
