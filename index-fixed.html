<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout fixed</title>
  <script>
    fetch('index.html', { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        const css = `
    .media-row {
      max-width: 1240px;
      margin-left: auto;
      margin-right: auto;
      padding: 10px;
      grid-template-columns: minmax(300px, 3fr) minmax(260px, 2fr);
      align-items: start;
      background: #101624;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .player { overflow: hidden; box-shadow: none; }
    .player-wrap { overflow: hidden; aspect-ratio: 16 / 9; min-height: 0; max-height: none; }
    .player-frame { width: 100%; margin-left: 0; height: 100%; display: block; }
    .tv-guide { box-shadow: none; height: 490px; max-height: 490px; display: flex; flex-direction: column; }
    .guide-list { flex: 1; max-height: none; overflow-y: auto; }

    /* fonturi mai mari (clar vizibile) */
    .guide-row { font-size: 1.25em !important; }
    .guide-time { text-align: center; font-size: 1.2em !important; }
    .guide-show { font-size: 1.25em !important; }

    /* header mare */
    .guide-title { font-size: 2rem !important; }
    .guide-badge { font-size: 1.2rem !important; }

    @media (max-width:900px) { .media-row { grid-template-columns: 1fr; } .tv-guide { height: auto; max-height: none; } }
`;
        html = html.replace('</style>', css + '</style>');
        document.open();
        document.write(html);
        document.close();

        function centerNowInGuide() {
          const guideList = document.getElementById('guideList');
          const nowRow = guideList?.querySelector('.guide-row.now');
          if (!guideList || !nowRow) return;

          const containerHeight = guideList.clientHeight;
          const rowOffset = nowRow.offsetTop;
          const rowHeight = nowRow.offsetHeight;

          /* mutat mai jos (aprox 3-4 linii) */
          guideList.scrollTop = rowOffset - (containerHeight / 2) + (rowHeight / 2) + 120;
        }

        setTimeout(centerNowInGuide, 700);
        setTimeout(centerNowInGuide, 1500);
        setInterval(centerNowInGuide, 4000);
      });
  </script>
</head>
<body></body>
</html>
