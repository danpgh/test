<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout fixed</title>
  <script>
    fetch('index.html', { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        html = html.replace("name:'TV 1000'","name:'KINO TV'");
        html = html.replace("International movie catalog channel.","Kino TV (fost TV 1000). ");

        const css = `
    .media-row { max-width:1240px;margin:auto;padding:10px;grid-template-columns:minmax(300px,3fr) minmax(260px,2fr);align-items:start;background:#101624;border:1px solid var(--border);border-radius:14px; }
`;
        html = html.replace('</style>', css + '</style>');
        document.open(); document.write(html); document.close();

        function removeButtons(){
          const b1 = document.getElementById('goToProgram'); if(b1) b1.remove();
          const b2 = document.getElementById('playerFullscreenBtn'); if(b2) b2.remove();
        }
        setInterval(removeButtons,500);

        function keyControl(){
          document.addEventListener('keydown', function(e){
            if (e.target && (e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA')) return;
            if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
            e.preventDefault();

            const buttons = Array.from(document.querySelectorAll('button'));
            const prev = buttons.find(b => /CH\s*-/i.test(b.textContent));
            const next = buttons.find(b => /CH\s*\+/i.test(b.textContent));

            if (e.key === 'ArrowLeft' && prev) prev.click();
            if (e.key === 'ArrowRight' && next) next.click();
          }, {passive:false});
        }
        setTimeout(keyControl,800);

        function fixFavorites(){
          const btn = document.getElementById('showFavorites'); if (!btn) return;
          const saved = localStorage.getItem('iptv-favorites-only');
          if (saved === '1' && !btn.classList.contains('active')) btn.click();
          if (!btn._hooked) {
            btn._hooked = true;
            btn.addEventListener('click', () => {
              setTimeout(() => {
                const active = btn.classList.contains('active');
                localStorage.setItem('iptv-favorites-only', active ? '1' : '0');
              }, 50);
            });
          }
        }
        setInterval(fixFavorites,500);

        // 🔥 EPG MAPPING FIX
        function mapEPG(){
          if (!window.epgState || !epgState.programsByChannel) return;
          const p = epgState.programsByChannel;

          function map(to, fromList){
            for (let f of fromList){
              if (p[f]){
                p[to] = p[f];
                return;
              }
            }
          }

          map('KINO TV', ['VIASAT KINO', 'VIASAT KINO TV']);
          map('PROCINEMA', ['PROCINEMA', 'PRO CINEMA']);
          map('SHOWTIME 1', ['SHOWTIME 1', 'SHOWTIME ONE']);
          map('SHOWTIME 2', ['SHOWTIME 2']);
          map('BOLLYWOOD', ['BOLLYWOOD TV', 'ZEE CINEMA']);
          map('AXN', ['AXN', 'AXN CE', 'AXN HD']);
        }
        setInterval(mapEPG,1000);

        function place(){
          var g=document.getElementById('guideList'); if(!g)return;
          var n=g.querySelector('.guide-row.now');
          if(!n){
            var rows=g.querySelectorAll('.guide-row');
            for(var i=0;i<rows.length;i++){
              var tm=rows[i].querySelector('.guide-time');
              if(tm && tm.textContent.trim().toLowerCase()==='acum'){n=rows[i];break;}
            }
          }
          if(!n) return;
          var A=g.getBoundingClientRect(); var B=n.getBoundingClientRect();
          g.scrollTop += (B.top - A.top) - 5;
        }
        setInterval(place,1000);

      });
  </script>
</head>
<body></body>
</html>
